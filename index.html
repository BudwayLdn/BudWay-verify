<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Ldn | Luxury Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#030303;
color:white;
overflow-x:hidden;
position:relative;
min-height:100vh;
}

/* GOLD PARTICLES */

.particles{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;
z-index:0;
}

.particle{
position:absolute;
border-radius:50%;
background:
radial-gradient(circle,
rgba(255,240,170,1) 0%,
rgba(212,166,61,0.9) 30%,
rgba(212,166,61,0) 75%);
box-shadow:
0 0 18px rgba(255,220,120,0.8),
0 0 40px rgba(212,166,61,0.5),
0 0 80px rgba(212,166,61,0.3);
animation:floatUp linear infinite;
opacity:0;
}

/* PARTICLES */

.p1{width:14px;height:14px;left:4%;animation-duration:18s;animation-delay:0s;}
.p2{width:22px;height:22px;left:12%;animation-duration:24s;animation-delay:2s;}
.p3{width:12px;height:12px;left:20%;animation-duration:20s;animation-delay:5s;}
.p4{width:28px;height:28px;left:32%;animation-duration:26s;animation-delay:1s;}
.p5{width:18px;height:18px;left:41%;animation-duration:19s;animation-delay:4s;}
.p6{width:24px;height:24px;left:50%;animation-duration:28s;animation-delay:6s;}
.p7{width:16px;height:16px;left:58%;animation-duration:18s;animation-delay:2s;}
.p8{width:32px;height:32px;left:66%;animation-duration:30s;animation-delay:3s;}
.p9{width:14px;height:14px;left:74%;animation-duration:20s;animation-delay:1s;}
.p10{width:26px;height:26px;left:82%;animation-duration:25s;animation-delay:7s;}
.p11{width:18px;height:18px;left:88%;animation-duration:21s;animation-delay:2s;}
.p12{width:34px;height:34px;left:94%;animation-duration:32s;animation-delay:5s;}

/* GOLD SPARKLES */

.spark{
position:absolute;
width:4px;
height:80px;
background:
linear-gradient(
to bottom,
rgba(255,255,255,0),
rgba(255,235,160,1),
rgba(255,255,255,0)
);
filter:blur(0.5px);
opacity:0;
animation:sparkle 6s linear infinite;
box-shadow:
0 0 18px rgba(255,220,120,0.9),
0 0 40px rgba(212,166,61,0.6);
transform:rotate(35deg);
}

.s1{left:12%;top:15%;animation-delay:0s;}
.s2{left:28%;top:65%;animation-delay:1s;}
.s3{left:48%;top:22%;animation-delay:2s;}
.s4{left:64%;top:72%;animation-delay:3s;}
.s5{left:80%;top:30%;animation-delay:4s;}
.s6{left:90%;top:60%;animation-delay:5s;}
.s7{left:40%;top:48%;animation-delay:2.5s;}
.s8{left:70%;top:12%;animation-delay:1.5s;}

/* BACKGROUND */

body::before{
content:'';
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#d4a63d20 0%,transparent 70%);
top:-300px;
right:-250px;
filter:blur(120px);
z-index:-2;
}

body::after{
content:'';
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,#00ff8810 0%,transparent 70%);
bottom:-250px;
left:-200px;
filter:blur(120px);
z-index:-2;
}

/* GRID */

.grid{
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(212,166,61,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(212,166,61,0.03) 1px, transparent 1px);
background-size:60px 60px;
opacity:0.25;
z-index:-1;
}

/* NAVBAR */

nav{
width:100%;
padding:28px 6%;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
z-index:100;
}

.logo{
display:flex;
align-items:center;
gap:18px;
}

.logo-icon{
width:82px;
height:82px;
border-radius:24px;
background:
linear-gradient(145deg,#fff0a8,#b67c11);
display:flex;
justify-content:center;
align-items:center;
font-size:48px;
font-weight:900;
color:black;
position:relative;
overflow:hidden;
box-shadow:
0 0 40px rgba(212,166,61,0.45),
0 0 80px rgba(212,166,61,0.15);
}

.logo-icon::before{
content:'';
position:absolute;
width:180%;
height:180%;
background:
linear-gradient(120deg,
transparent,
rgba(255,255,255,0.35),
transparent);
animation:shine 5s linear infinite;
}

.logo-text h1{
font-size:38px;
font-weight:900;
letter-spacing:4px;
}

.logo-text span{
color:#d4a63d;
text-shadow:0 0 20px rgba(212,166,61,0.5);
}

.logo-text p{
font-size:11px;
letter-spacing:7px;
color:#888;
margin-top:4px;
}

/* HERO */

.hero{
padding:20px 6% 60px;
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:60px;
min-height:88vh;
position:relative;
z-index:2;
}

/* LEFT */

.hero-left .tag{
display:inline-block;
padding:12px 18px;
border-radius:14px;
border:1px solid rgba(212,166,61,0.3);
background:rgba(212,166,61,0.05);
color:#f1c96c;
font-size:12px;
font-weight:700;
letter-spacing:1px;
margin-bottom:35px;
box-shadow:0 0 20px rgba(212,166,61,0.12);
}

.hero-left h2{
font-size:96px;
line-height:0.92;
font-weight:900;
margin-bottom:30px;
}

.hero-left h2 span{
color:#d4a63d;
text-shadow:
0 0 18px rgba(212,166,61,0.35),
0 0 40px rgba(212,166,61,0.2);
}

.hero-left p{
font-size:20px;
line-height:1.9;
color:#b7b7b7;
max-width:640px;
margin-bottom:40px;
}

/* VERIFY */

.verify-box{
padding:30px;
border-radius:30px;
background:
linear-gradient(145deg,
rgba(255,255,255,0.03),
rgba(255,255,255,0.015));
border:1px solid rgba(212,166,61,0.18);
backdrop-filter:blur(30px);
box-shadow:
0 0 50px rgba(212,166,61,0.08);
position:relative;
overflow:hidden;
}

.verify-title{
text-align:center;
font-size:24px;
letter-spacing:4px;
font-weight:800;
color:#f2ca6d;
margin-bottom:28px;
}

.verify-row{
display:flex;
gap:20px;
}

.input-wrap{
flex:1;
height:88px;
background:black;
border-radius:22px;
display:flex;
align-items:center;
padding:0 24px;
border:1px solid rgba(212,166,61,0.18);
}

.input-wrap span{
font-size:26px;
margin-right:18px;
color:#d4a63d;
}

.input-wrap input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:20px;
font-weight:700;
letter-spacing:2px;
}

.verify-btn{
width:360px;
border:none;
border-radius:22px;
background:
linear-gradient(145deg,#ffe28f,#b67b10);
font-size:18px;
font-weight:900;
cursor:pointer;
color:black;
transition:0.3s;
box-shadow:
0 0 40px rgba(212,166,61,0.28);
position:relative;
overflow:hidden;
}

.verify-btn::before{
content:'';
position:absolute;
width:200%;
height:200%;
background:
linear-gradient(120deg,
transparent,
rgba(255,255,255,0.35),
transparent);
animation:shine 4s linear infinite;
}

.verify-btn:hover{
transform:translateY(-3px) scale(1.02);
}

/* RIGHT */

.hero-right{
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

.ring{
position:absolute;
width:650px;
height:650px;
border-radius:50%;
border:1px solid rgba(212,166,61,0.15);
animation:spin 26s linear infinite;
}

.coin{
width:470px;
height:470px;
border-radius:50%;
background:
radial-gradient(circle at top,#fff0a6,#b77d11);
display:flex;
justify-content:center;
align-items:center;
font-size:250px;
font-weight:900;
color:black;
position:relative;
overflow:hidden;
box-shadow:
0 0 90px rgba(212,166,61,0.45),
0 0 180px rgba(212,166,61,0.18);
}

.coin::before{
content:'';
position:absolute;
inset:24px;
border-radius:50%;
border:3px solid rgba(0,0,0,0.35);
}

.coin::after{
content:'';
position:absolute;
width:150%;
height:150%;
background:
linear-gradient(120deg,
transparent,
rgba(255,255,255,0.35),
transparent);
animation:shine 5s linear infinite;
}

.platform{
position:absolute;
bottom:-40px;
width:520px;
height:100px;
border-radius:50%;
background:
radial-gradient(circle,
rgba(212,166,61,0.55) 0%,
transparent 70%);
filter:blur(25px);
}

/* ANIMATIONS */

@keyframes shine{
0%{
transform:translateX(-200%) rotate(25deg);
}
100%{
transform:translateX(200%) rotate(25deg);
}
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

@keyframes floatUp{

0%{
transform:
translateY(120vh)
translateX(0px)
scale(0.5);
opacity:0;
}

10%{
opacity:1;
}

50%{
transform:
translateY(50vh)
translateX(40px)
scale(1);
}

100%{
transform:
translateY(-20vh)
translateX(-30px)
scale(1.3);
opacity:0;
}

}

@keyframes sparkle{

0%{
opacity:0;
transform:
scale(0.5)
rotate(35deg);
}

10%{
opacity:1;
}

50%{
opacity:0.9;
transform:
scale(1.2)
rotate(35deg);
}

100%{
opacity:0;
transform:
scale(0.4)
rotate(35deg);
}

}

/* MOBILE */

@media(max-width:1200px){

.hero{
grid-template-columns:1fr;
text-align:center;
}

.verify-row{
flex-direction:column;
}

.verify-btn{
width:100%;
height:88px;
}

.hero-right{
margin-top:60px;
}

.coin{
width:340px;
height:340px;
font-size:180px;
}

.ring{
width:450px;
height:450px;
}

.hero-left h2{
font-size:68px;
}

}

@media(max-width:700px){

.hero-left h2{
font-size:50px;
}

.coin{
width:260px;
height:260px;
font-size:130px;
}

.ring{
width:340px;
height:340px;
}

.platform{
width:320px;
}

.verify-box{
padding:22px;
}

.input-wrap{
height:74px;
}

}

</style>

</head>

<body>

<div class="particles">

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>
<div class="particle p6"></div>
<div class="particle p7"></div>
<div class="particle p8"></div>
<div class="particle p9"></div>
<div class="particle p10"></div>
<div class="particle p11"></div>
<div class="particle p12"></div>

<div class="spark s1"></div>
<div class="spark s2"></div>
<div class="spark s3"></div>
<div class="spark s4"></div>
<div class="spark s5"></div>
<div class="spark s6"></div>
<div class="spark s7"></div>
<div class="spark s8"></div>

</div>

<div class="grid"></div>

<nav>

<div class="logo">

<div class="logo-icon">
B
</div>

<div class="logo-text">
<h1>BUD<span>WAY</span></h1>
<p>LDN</p>
</div>

</div>

</nav>

<section class="hero">

<div class="hero-left">

<div class="tag">
PREMIUM CANNABIS VERIFICATION
</div>

<h2>
VERIFY.<br>
<span>AUTHENTIC.</span><br>
<span>EXCLUSIVE.</span>
</h2>

<p>
BudWay Ldn guarantees premium, lab-tested cannabis flower.
Enter your serial number to verify authenticity
and discover if you’re holding a winner.
</p>

<div class="verify-box">

<div class="verify-title">
VERIFY YOUR PRODUCT
</div>

<div class="verify-row">

<div class="input-wrap">

<span>⬢</span>

<input
type="number"
id="serialInput"
placeholder="ENTER SERIAL NUMBER"
/>

</div>

<button class="verify-btn" onclick="verifyProduct()">
VERIFY AUTHENTICITY →
</button>

</div>

</div>

</div>

<div class="hero-right">

<div class="ring"></div>

<div class="coin">
B
</div>

<div class="platform"></div>

</div>

</section>

<script>

function verifyProduct(){

const code =
document.getElementById('serialInput').value.trim();

if(code === ''){
alert('Please enter a serial number.');
return;
}

window.location.href =
`verify.html?code=${code}`;

}

document
.getElementById('serialInput')
.addEventListener('keypress', function(e){

if(e.key === 'Enter'){
verifyProduct();
}

});

</script>

</body>
</html>
