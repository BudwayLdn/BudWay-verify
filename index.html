*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#030303;
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
min-height:100vh;
position:relative;
}

/* BACKGROUND */

body::before{
content:'';
position:absolute;
width:800px;
height:800px;
background:radial-gradient(circle,#00ff88 0%,transparent 70%);
top:-300px;
right:-300px;
opacity:0.18;

}

body::after{
content:'';
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#ffd700 0%,transparent 70%);
bottom:-300px;
left:-250px;
opacity:0.12;
filter:blur(120px);
animation:pulse2 7s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

@keyframes pulse2{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

.card:hover{
transform:translateY(-4px);
border-color:#00ff88;
}

.card-icon{
font-size:34px;
margin-bottom:14px;
}

.card-title{
font-size:17px;
font-weight:600;
margin-bottom:8px;
}

.card-text{
font-size:14px;
color:#a8a8a8;
line-height:1.6;
}

.footer{
