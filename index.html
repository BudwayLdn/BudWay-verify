<!DOCTYPE html>
<html>
<head>
<title>BudWay Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:black;
color:white;
text-align:center;
padding:40px;
}
input{
padding:12px;
font-size:18px;
}
button{
padding:12px 20px;
font-size:18px;
background:lime;
border:none;
cursor:pointer;
}
.result{
margin-top:25px;
font-size:22px;
}
</style>
</head>

<body>

<h1>BudWay Product Verification</h1>

<p>Enter verification code from package</p>

<input id="code" placeholder="Verification Code">

<br><br>

<button onclick="verify()">Verify</button>

<div class="result" id="result"></div>

<script>

async function verify(){

let input=document.getElementById("code").value.trim();

let response=await fetch("codes.json");

let data=await response.json();

if(data.valid_codes.includes(input)){

document.getElementById("result").innerHTML=
"✅ AUTHENTIC BUDWAY PRODUCT";

}else{

document.getElementById("result").innerHTML=
"❌ CODE NOT FOUND";

}

}

</script>

</body>
</html>
