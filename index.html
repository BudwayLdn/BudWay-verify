<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Ldn</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */

body{
    font-family:'Space Grotesk',sans-serif;
    background:#050505;
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BACKGROUND GLOW */

.bg-glow{
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#00ff8840 0%,transparent 70%);
    filter:blur(60px);
    animation:pulse 4s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

/* CARD */

.card{
    position:relative;
    width:420px;
    padding:55px 40px;
    border-radius:30px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,136,0.08);
}

/* LOGO */

.logo{
    font-size:46px;
    font-weight:700;
    letter-spacing:3px;
    margin-bottom:12px;
}

.logo span{
    color:#00ff88;
}

/* TEXT */

.subtitle{
    color:#888;
    font-size:14px;
    margin-bottom:45px;
    letter-spacing:1px;
    line-height:1.6;
}

/* INPUT */

input{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#111;
    color:white;
    font-size:17px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.3s;
}

input:focus{
    border-color:#00ff88;
    box-shadow:0 0 20px rgba(0,255,136,0.25);
}

/* BUTTON */

button{
    width:100%;
    margin-top:20px;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#00ff88;
    color:black;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(0,255,136,0.4);
}

/* FOOTER */

.footer{
    margin-top:30px;
    color:#555;
    font-size:11px;
    letter-spacing:1px;
}

</style>

</head>

<body>

<div class="bg-glow"></div>

<div class="card">

    <div class="logo">
        BUD<span>WAY</span>
    </div>

    <div class="subtitle">
        Premium Product Verification Portal
    </div>

    <input
        type="number"
        id="serialInput"
        placeholder="ENTER SERIAL NUMBER"
    >

    <button onclick="goVerify()">
        VERIFY PRODUCT
    </button>

    <div class="footer">
        OFFICIAL BUDWAY AUTHENTICATION SYSTEM
    </div>

</div>

<script>

function goVerify(){

    let serial =
    document.getElementById("serialInput").value;

    if(serial.trim() !== ""){

        window.location.href =
        "verify.html?code=" + serial;

    }

}

</script>

</body>
</html>
