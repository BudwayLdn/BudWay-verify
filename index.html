<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sweet Shop Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#050505;
color:white;
overflow:hidden;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#00ff88 0%,transparent 30%),
radial-gradient(circle at bottom right,#ffd700 0%,transparent 30%);
opacity:.18;
z-index:-2;
}

.grid{
position:fixed;
inset:0;
background:
linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
background-size:40px 40px;
z-index:-1;
}

.card{
width:90%;
max-width:420px;
background:rgba(10,10,10,.92);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:28px;
padding:32px;
text-align:center;
position:relative;
overflow:hidden;
box-shadow:
0 0 40px rgba(0,0,0,.8),
0 0 40px rgba(0,255,136,.15);
}

.glow{
position:absolute;
width:260px;
height:260px;
border-radius:50%;
background:radial-gradient(circle,#00ff88,transparent 70%);
top:-120px;
right:-120px;
opacity:.25;
filter:blur(25px);
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:2.2rem;
font-weight:900;
letter-spacing:2px;
margin-bottom:10px;
background:linear-gradient(90deg,#00ff88,white,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:.9rem;
color:#a0a0a0;
margin-bottom:28px;
}

.input-box{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:16px;
background:#111;
color:white;
font-size:1rem;
text-align:center;
margin-bottom:18px;
border:1px solid rgba(255,255,255,.08);
font-family:'Orbitron',sans-serif;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#00ff88,#00c96b);
color:black;
font-weight:700;
font-size:1rem;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.03);
box-shadow:0 0 25px rgba(0,255,136,.35);
}

.footer{
margin-top:20px;
font-size:.75rem;
color:#777;
}

</style>
</head>

<body>

<div class="grid"></div>

<div class="card">

<div class="glow"></div>

<div class="logo">SWEET SHOP</div>

<div class="subtitle">
Premium Authenticity Verification
</div>

<input 
type="text" 
id="serialInput" 
class="input-box"
placeholder="ENTER SERIAL NUMBER"
/>

<button class="btn" onclick="verifySerial()">
VERIFY PRODUCT
</button>

<div class="footer">
Protected by Sweet Shop Verification Technology
</div>

</div>

<script>

function verifySerial(){

const serial = document.getElementById('serialInput').value.trim();

if(serial){

window.location.href = 
`verify.html?code=${serial}`;

}

}

</script>

</body>
</html>
