<!DOCTYPE html>
<html>
<head>
    <title>BUDWAY Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            text-align: center;
            padding: 40px;
        }
        .box {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,255,120,0.2);
        }
        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            background: #00ff88;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>BUDWAY Product Verification</h1>
        <p>Enter your verification code:</p>
        <input id="code" placeholder="Enter Code">
        <br>
        <button onclick="verify()">Verify</button>
        <p id="result"></p>
    </div>

<script>
const validCodes = ["BW12345", "BW67890", "BW11223"];

function verify() {
    const input = document.getElementById("code").value.trim();
    const result = document.getElementById("result");

    if(validCodes.includes(input)) {
        result.innerHTML = "✅ Authentic BUDWAY Product";
        result.style.color = "#00ff88";
    } else {
        result.innerHTML = "❌ Invalid Code";
        result.style.color = "red";
    }
}
</script>

</body>
</html>
