<!DOCTYPE html>
<html>
<head>
<title>BudWay Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:black;
color:white;
text-align:center;
padding:40px;
}
input{
padding:12px;
font-size:18px;
}
button{
padding:12px 20px;
font-size:18px;
background:lime;
border:none;
cursor:pointer;
}
.result{
margin-top:25px;
font-size:22px;
white-space: pre-line;
}
</style>
</head>

<body>

<h1>BudWay Product Verification</h1>

<p>Enter verification code from package</p>

<input id="code" placeholder="Verification Code">

<br><br>

<button onclick="verifyCode()">Verify</button>

<div class="result" id="result"></div>

<script>

async function verifyCode(){

let input = document.getElementById("code");

let code = Number(input.value);

let result = document.getElementById("result");

if(code >= 803541 && code <= 803542){

result.innerHTML = `
✅ AUTHENTIC BUDWAY PRODUCT

Strain: Pink Starburst
`;

}

else if(code >= 803547 && code <= 803559){

result.innerHTML = `
✅ AUTHENTIC BUDWAY PRODUCT

Strain: Blueberry
`;

}

else if(code >= 803560 && code <= 803568){

result.innerHTML = `
✅ AUTHENTIC BUDWAY PRODUCT

Strain: Blue Bubblegum Gelato
`;

}

else if(code >= 803569 && code <= 803584){

result.innerHTML = `
✅ AUTHENTIC BUDWAY PRODUCT

Strain: Mango Sapphire
`;

}

else{

result.innerHTML = `❌ INVALID CODE`;

}

}
else{

result.innerHTML = "❌ INVALID CODE";

}

else{

result.innerHTML = "❌ INVALID CODE"

}

}else{

document.getElementById("result").innerHTML=
"❌ CODE NOT FOUND";

}

}

</script>

</body>
</html>
