<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BudWay Ldn | Premium Verification</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:
  radial-gradient(circle at top right,#00ff8840 0%,transparent 35%),
  radial-gradient(circle at bottom left,#ffd70020 0%,transparent 35%),
  #030303;

  overflow:hidden;
  font-family:'Inter',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  position:relative;
}

/* animated grid */

.grid{
  position:absolute;
  width:100%;
  height:100%;
  background-image:
  linear-gradient(rgba(0,255,136,0.05) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0,255,136,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  transform:perspective(800px) rotateX(60deg);
  animation:gridMove 18s linear infinite;
  opacity:0.25;
}

@keyframes gridMove{
  0%{
    transform:perspective(800px) rotateX(60deg) translateY(0);
  }

  100%{
    transform:perspective(800px) rotateX(60deg) translateY(40px);
  }
}

/* glowing orbs */

.orb1,.orb2{
  position:absolute;
  border-radius:50%;
  filter:blur(100px);
}

.orb1{
  width:300px;
  height:300px;
  background:#00ff88;
  top:-100px;
  right:-100px;
  opacity:0.15;
}

.orb2{
  width:250px;
  height:250px;
  background:#ffd700;
  bottom:-100px;
  left:-100px;
  opacity:0.08;
}

/* main card */

.container{
  width:92%;
  max-width:480px;

  background:rgba(255,255,255,0.04);

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(30px);

  border-radius:35px;

  padding:45px 30px;

  position:relative;

  z-index:5;

  overflow:hidden;

  box-shadow:
  0 0 60px rgba(0,255,136,0.12),
  inset 0 0 30px rgba(255,255,255,0.03);
}

.container::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:35px;
  padding:1px;
  background:linear-gradient(135deg,#00ff88,#ffffff10,#ffd70040);
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

/* B logo */

.logo-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.logo-circle{
  width:95px;
  height:95px;
  border-radius:28px;

  background:
  linear-gradient(145deg,#00ff88,#00b35f);

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:
  0 0 35px rgba(0,255,136,0.5),
  inset 0 0 20px rgba(255,255,255,0.25);

  position:relative;
}

.logo-circle::before{
  content:'';
  position:absolute;
  inset:2px;
  border-radius:26px;
  background:#050505;
}

.logo-b{
  position:relative;
  z-index:2;
  font-size:54px;
  font-weight:900;
  font-family:'Orbitron',sans-serif;
  color:#00ff88;
  text-shadow:0 0 20px #00ff88;
}

.brand{
  text-align:center;
  margin-bottom:15px;
}

.brand h1{
  font-size:52px;
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  letter-spacing:3px;
}

.brand h1 span{
  color:#00ff88;
  text-shadow:0 0 15px #00ff88;
}

.subtitle{
  text-align:center;
  color:#a7a7a7;
  font-size:15px;
  line-height:1.7;
  margin-bottom:40px;
}

.verify-title{
  text-align:center;
  font-size:28px;
  font-weight:700;
  margin-bottom:25px;
}

.input-box{
  width:100%;
  height:72px;

  border:none;
  outline:none;

  border-radius:22px;

  background:rgba(255,255,255,0.04);

  border:1px solid rgba(255,255,255,0.08);

  color:white;

  text-align:center;

  font-size:22px;

  margin-bottom:22px;

  transition:0.35s;
}

.input-box:focus{
  border-color:#00ff88;

  box-shadow:
  0 0 25px rgba(0,255,136,0.3),
  inset 0 0 10px rgba(0,255,136,0.15);
}

.verify-btn{
  width:100%;
  height:72px;

  border:none;
  border-radius:22px;

  background:
  linear-gradient(135deg,#00ff88,#00c96d);

  color:black;

  font-size:21px;
  font-weight:800;

  cursor:pointer;

  transition:0.35s;

  letter-spacing:1px;

  box-shadow:0 0 30px rgba(0,255,136,0.35);
}

.verify-btn:hover{
  transform:translateY(-3px) scale(1.01);

  box-shadow:
  0 0 40px rgba(0,255,136,0.5);
}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-top:35px;
}

.feature{
  background:rgba(255,255,255,0.03);

  border:1px solid rgba(255,255,255,0.05);

  border-radius:22px;

  padding:22px 15px;

  text-align:center;

  font-size:15px;

  color:#d0d0d0;

  line-height:1.5;

  backdrop-filter:blur(20px);
}

.footer{
  margin-top:35px;
  text-align:center;
  color:#666;
  font-size:13px;
}

@media(max-width:600px){

  .brand h1{
    font-size:42px;
  }

  .verify-title{
    font-size:24px;
  }

  .input-box{
    height:65px;
    font-size:20px;
  }

  .verify-btn{
    height:65px;
    font-size:18px;
  }

}

</style>
</head>

<body>

<div class="grid"></div>

<div class="orb1"></div>
<div class="orb2"></div>

<div class="container">

<div class="logo-wrap">
  <div class="logo-circle">
    <div class="logo-b">B</div>
  </div>
</div>

<div class="brand">
  <h1>BUD<span>WAY</span></h1>
</div>

<div class="subtitle">
  Luxury Cannabis Authentication Platform<br>
  Secure Premium Product Verification
</div>

<div class="verify-title">
  Verify Your Product
</div>

<input
type="number"
id="serialInput"
class="input-box"
placeholder="ENTER SERIAL NUMBER"
/>

<button class="verify-btn" onclick="verifyProduct()">
VERIFY AUTHENTICITY
</button>

<div class="features">

<div class="feature">
✓ NFC Style Validation
</div>

<div class="feature">
✓ Secure Product Tracking
</div>

<div class="feature">
✓ Premium Strain Registry
</div>

<div class="feature">
✓ Reward Winner Detection
</div>

</div>

<div class="footer">
© 2026 BudWay Ldn
</div>

</div>

<script>

function verifyProduct(){

  const code =
  document.getElementById('serialInput').value.trim();

  if(code === ''){
    alert('Please enter a serial number');
    return;
  }

  window.location.href =
  `verify.html?code=${code}`;
}

document
.getElementById('serialInput')
.addEventListener('keypress',function(e){

  if(e.key === 'Enter'){
    verifyProduct();
  }

});

</script>

</body>
</html>
