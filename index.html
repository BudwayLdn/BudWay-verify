<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudWay Ldn</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#040404;
color:white;
position:relative;
}

/* BACKGROUND */

body::before{
content:'';
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#d4a63d33 0%,transparent 70%);
top:-250px;
right:-180px;
filter:blur(120px);
}

body::after{
content:'';
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#00ff8820 0%,transparent 70%);
bottom:-300px;
left:-250px;
filter:blur(120px);
}

.grid{
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(212,166,61,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(212,166,61,0.03) 1px, transparent 1px);
background-size:55px 55px;
opacity:0.3;
}

/* MAIN CARD */

.main{
position:relative;
z-index:5;
width:94%;
height:92vh;
margin:4vh auto;
border-radius:38px;
border:1px solid rgba(212,166,61,0.18);
background:rgba(0,0,0,0.82);
backdrop-filter:blur(30px);
display:grid;
grid-template-columns:1fr 1fr;
overflow:hidden;
box-shadow:
0 0 80px rgba(212,166,61,0.08);
}

/* LEFT */

.left{
padding:45px 55px;
display:flex;
flex-direction:column;
justify-content:center;
}

.logo{
display:flex;
align-items:center;
gap:16px;
margin-bottom:35px;
}

.logo-box{
width:72px;
height:72px;
border-radius:22px;
background:linear-gradient(145deg,#ffe79c,#b77d0f);
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:900;
color:black;
box-shadow:
0 0 35px rgba(212,166,61,0.45);
}

.logo-text h1{
font-size:38px;
font-weight:900;
letter-spacing:3px;
}

.logo-text span{
color:#d4a63d;
}

.logo-text p{
font-size:11px;
letter-spacing:7px;
color:#888;
margin-top:4px;
}

.tag{
display:inline-block;
padding:10px 16px;
border-radius:12px;
border:1px solid rgba(212,166,61,0.25);
color:#f0c96a;
font-size:11px;
letter-spacing:1px;
margin-bottom:25px;
width:fit-content;
background:rgba(212,166,61,0.05);
}

h2{
font-size:72px;
line-height:0.92;
font-weight:900;
margin-bottom:25px;
}

h2 span{
color:#d4a63d;
}

.desc{
font-size:17px;
line-height:1.7;
color:#b8b8b8;
max-width:560px;
margin-bottom:30px;
}

/* VERIFY */

.verify{
display:flex;
gap:16px;
margin-bottom:22px;
}

.input-box{
flex:1;
height:74px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(212,166,61,0.14);
border-radius:20px;
display:flex;
align-items:center;
padding:0 22px;
}

.input-box span{
font-size:24px;
color:#d4a63d;
margin-right:16px;
}

.input-box input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:18px;
font-weight:700;
letter-spacing:2px;
}

.verify-btn{
width:300px;
border:none;
border-radius:20px;
background:linear-gradient(145deg,#ffe08b,#bc8315);
font-size:17px;
font-weight:800;
cursor:pointer;
color:black;
box-shadow:
0 0 30px rgba(212,166,61,0.3);
transition:0.3s;
}

.verify-btn:hover{
transform:scale(1.03);
}

/* STATS */

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
max-width:650px;
}

.stat{
padding:14px 18px;
border-radius:16px;
background:rgba(255,255,255,0.025);
border:1px solid rgba(212,166,61,0.12);
font-size:13px;
color:#ccc;
}

/* RIGHT */

.right{
position:relative;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* GOLD COIN */

.coin-bg{
position:absolute;
width:650px;
height:650px;
border-radius:50%;
border:1px solid rgba(212,166,61,0.08);
animation:spin 24s linear infinite;
}

.coin{
width:400px;
height:400px;
border-radius:50%;
background:
radial-gradient(circle at top,#ffe58e,#af7410);
display:flex;
justify-content:center;
align-items:center;
font-size:220px;
font-weight:900;
color:black;
position:relative;
box-shadow:
0 0 80px rgba(212,166,61,0.45),
0 0 140px rgba(212,166,61,0.16);
}

.coin::before{
content:'';
position:absolute;
inset:20px;
border-radius:50%;
border:3px solid rgba(0,0,0,0.35);
}

.coin::after{
content:'';
position:absolute;
width:130%;
height:130%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.25),transparent);
animation:shine 4s linear infinite;
}

.platform{
position:absolute;
bottom:140px;
width:420px;
height:70px;
border-radius:50%;
background:radial-gradient(circle,#d4a63d55 0%,transparent 70%);
filter:blur(24px);
}

/* ANIMATION */

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

@keyframes shine{
0%{
transform:translateX(-200%) rotate(25deg);
}
100%{
transform:translateX(200%) rotate(25deg);
}
}

/* MOBILE */

@media(max-width:1100px){

body{
overflow:auto;
height:auto;
}

.main{
height:auto;
grid-template-columns:1fr;
}

.left{
padding:40px 28px;
text-align:center;
align-items:center;
}

.verify{
flex-direction:column;
width:100%;
}

.verify-btn{
width:100%;
height:74px;
}

.stats{
grid-template-columns:1fr;
width:100%;
}

.right{
padding:50px 0 70px;
}

.coin{
width:280px;
height:280px;
font-size:150px;
}

.coin-bg{
width:420px;
height:420px;
}

.platform{
bottom:40px;
width:300px;
}

h2{
font-size:52px;
}

.desc{
font-size:15px;
}

}

</style>
</head>

<body>

<div class="grid"></div>

<div class="main">

<!-- LEFT -->

<div class="left">

<div class="logo">

<div class="logo-box">
B
</div>

<div class="logo-text">
<h1>BUD<span>WAY</span></h1>
<p>LDN</p>
</div>

</div>

<div class="tag">
PREMIUM CANNABIS VERIFICATION
</div>

<h2>
VERIFY.<br>
<span>AUTHENTIC.</span><br>
<span>EXCLUSIVE.</span>
</h2>

<div class="desc">
BudWay Ldn guarantees luxury lab-tested cannabis flower with secure premium authentication technology.
</div>

<div class="verify">

<div class="input-box">

<span>⬢</span>

<input
type="number"
id="serialInput"
placeholder="ENTER SERIAL NUMBER"
/>

</div>

<button class="verify-btn" onclick="verifyProduct()">
VERIFY AUTHENTICITY →
</button>

</div>

<div class="stats">

<div class="stat">
🛡️ 100% Authentic Products
</div>

<div class="stat">
🧪 Lab Certified Verification
</div>

<div class="stat">
🏆 Exclusive Winner Detection
</div>

<div class="stat">
🔒 Encrypted & Protected
</div>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<div class="coin-bg"></div>

<div class="coin">
B
</div>

<div class="platform"></div>

</div>

</div>

<script>

function verifyProduct(){

const code =
document.getElementById('serialInput').value.trim();

if(code === ''){
alert('Please enter a serial number.');
return;
}

window.location.href =
`verify.html?code=${code}`;

}

document
.getElementById('serialInput')
.addEventListener('keypress', function(e){

if(e.key === 'Enter'){
verifyProduct();
}

});

</script>

</body>
</html>
