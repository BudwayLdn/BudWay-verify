<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BudWay Ldn Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Arial,sans-serif;
background:#050505;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
overflow:hidden;
z-index:0;
}

.glow1,
.glow2{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:0.18;
}

.glow1{
width:300px;
height:300px;
background:#00ff88;
top:-100px;
left:-100px;
}

.glow2{
width:250px;
height:250px;
background:#d4af37;
bottom:-100px;
right:-100px;
}

/* MAIN BOX */

.container{
position:relative;
z-index:2;
width:92%;
max-width:380px;
height:95vh;
background:rgba(12,12,12,0.92);
border:1px solid rgba(0,255,136,0.18);
border-radius:26px;
padding:18px;
backdrop-filter:blur(8px);
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:
0 0 25px rgba(0,255,136,0.08),
0 0 45px rgba(0,255,136,0.04);
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:18px;
flex-shrink:0;
}

.logo h1{
font-size:2rem;
font-weight:900;
letter-spacing:2px;
color:#00ff88;
text-shadow:0 0 12px rgba(0,255,136,0.4);
}

.logo span{
color:#d4af37;
}

/* SEARCH BAR */

.search-box{
display:flex;
margin-bottom:16px;
flex-shrink:0;
}

.search-box input{
flex:1;
height:52px;
background:#111;
border:1px solid rgba(0,255,136,0.12);
border-radius:16px 0 0 16px;
outline:none;
padding:0 16px;
color:white;
font-size:1rem;
}

.search-box input::placeholder{
color:#777;
}

.search-box button{
width:110px;
border:none;
border-radius:0 16px 16px 0;
background:linear-gradient(135deg,#00ff88,#00c96b);
color:black;
font-weight:900;
cursor:pointer;
font-size:0.95rem;
transition:0.2s;
}

.search-box button:hover{
transform:scale(1.01);
}

/* LOADER */

.loader{
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
padding:25px 0;
}

.spinner{
width:44px;
height:44px;
border-radius:50%;
border:4px solid #222;
border-top:4px solid #00ff88;
animation:spin 0.8s linear infinite;
margin-bottom:14px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* RESULT */

.result{
display:none;
animation:fade 0.35s ease;
overflow:hidden;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.status{
padding:12px;
border-radius:16px;
font-weight:800;
text-align:center;
margin-bottom:14px;
font-size:0.95rem;
}

.authentic{
background:rgba(0,255,136,0.08);
border:1px solid rgba(0,255,136,0.25);
color:#00ff88;
}

.fake{
background:rgba(255,0,0,0.08);
border:1px solid rgba(255,0,0,0.25);
color:#ff5c5c;
}

/* CARD */

.card{
background:#101010;
border-radius:20px;
padding:16px;
border:1px solid rgba(0,255,136,0.12);
display:flex;
flex-direction:column;
gap:10px;
}

.strain{
font-size:1.2rem;
font-weight:900;
text-align:center;
color:#00ff88;
margin-bottom:5px;
}

.row{
display:flex;
justify-content:space-between;
gap:10px;
padding-bottom:8px;
border-bottom:1px solid #1d1d1d;
font-size:0.85rem;
}

.row:last-child{
border-bottom:none;
padding-bottom:0;
}

.label{
color:#888;
font-weight:700;
}

/* WINNER */

.winner{
margin-top:12px;
padding:14px;
border-radius:18px;
background:linear-gradient(135deg,#2c2200,#1b1500);
border:1px solid #d4af37;
text-align:center;
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{
box-shadow:0 0 8px rgba(212,175,55,0.18);
}
to{
box-shadow:0 0 18px rgba(212,175,55,0.38);
}
}

.winner h3{
font-size:1rem;
margin-bottom:8px;
color:#ffd95e;
}

.winner p{
font-size:0.82rem;
color:#eee;
margin-bottom:10px;
}

.code{
display:inline-block;
padding:10px 18px;
border-radius:12px;
background:#d4af37;
color:black;
font-weight:900;
letter-spacing:1px;
}

/* FOOTER */

.footer{
margin-top:auto;
padding-top:12px;
text-align:center;
font-size:0.72rem;
color:#555;
}

/* MOBILE FIT */

@media(max-height:760px){

.container{
height:98vh;
padding:15px;
}

.logo h1{
font-size:1.7rem;
}

.search-box input{
height:48px;
font-size:0.9rem;
}

.search-box button{
width:95px;
font-size:0.82rem;
}

.card{
padding:14px;
gap:8px;
}

.row{
font-size:0.78rem;
}

}

</style>
</head>

<body>

<div class="bg">
<div class="glow1"></div>
<div class="glow2"></div>
</div>

<div class="container">

<div class="logo">
<h1>BUD<span>WAY</span></h1>
</div>

<!-- ONLY ONE INPUT -->

<div class="search-box">

<input
type="number"
id="serialInput"
placeholder="Enter Serial Number"
/>

<button onclick="verifyCode()">
VERIFY
</button>

</div>

<div class="loader" id="loader">

<div class="spinner"></div>

<p>
Authenticating Product...
</p>

</div>

<div class="result" id="result"></div>

<div class="footer">
BudWay Ldn © 2026
</div>

</div>

<script>

const strains = [

{
name:"Pink StarBurst Gelato",
start:803541,
end:803546,
winner:803542,
genetics:"Pink Starburst x Gelato",
thc:"20-26%",
type:"50/50 Hybrid",
flavour:"Candy Strawberry Citrus Creamy"
},

{
name:"Legendary Blueberry",
start:803547,
end:803559,
winner:803551,
genetics:"Afghani x Thai x Purple Thai",
thc:"20-24%",
type:"80/20 Indica",
flavour:"Blueberry Jam Vanilla Earthy Spice"
},

{
name:"Blue Bubblegum Gelato",
start:803560,
end:803568,
winner:803564,
genetics:"Gelato 45 x Indiana Bubblegum",
thc:"24-32%",
type:"60/40 Indica",
flavour:"Sugary Bubblegum Berries Citrus"
},

{
name:"Mango Sapphire",
start:803569,
end:803584,
winner:803578,
genetics:"Bubba’s Gift x OG Kush x Afghan",
thc:"21-23%",
type:"85/15 Indica",
flavour:"Tropical Mango Coconut Citrus"
}

];

function verifyCode(){

const serial = Number(
document.getElementById("serialInput").value
);

const loader = document.getElementById("loader");
const result = document.getElementById("result");

result.style.display = "none";
loader.style.display = "flex";

setTimeout(()=>{

loader.style.display = "none";

let found = null;

for(let strain of strains){

if(serial >= strain.start && serial <= strain.end){

found = strain;
break;

}

}

if(found){

let winnerHTML = "";

if(serial === found.winner){

winnerHTML = `

<div class="winner">

<h3>
🎉 YOU WON 🎉
</h3>

<p>
You were our lucky winner for this strain!
🎉🎉🎉 — £10 off your Next Order!
</p>

<div class="code">
BW-10
</div>

</div>

`;

}

result.innerHTML = `

<div class="status authentic">
✅ Authentic BudWay Product
</div>

<div class="card">

<div class="strain">
${found.name}
</div>

<div class="row">
<span class="label">Serial</span>
<span>${serial}</span>
</div>

<div class="row">
<span class="label">Genetics</span>
<span>${found.genetics}</span>
</div>

<div class="row">
<span class="label">THC</span>
<span>${found.thc}</span>
</div>

<div class="row">
<span class="label">Type</span>
<span>${found.type}</span>
</div>

<div class="row">
<span class="label">Flavour</span>
<span>${found.flavour}</span>
</div>

${winnerHTML}

</div>

`;

}else{

result.innerHTML = `

<div class="status fake">
❌ Invalid Serial Number
</div>

`;

}

result.style.display = "block";

},700);

}

document
.getElementById("serialInput")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
verifyCode();
}

});

</script>

</body>
</html>
