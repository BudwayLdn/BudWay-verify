<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */

body{
    font-family:'Space Grotesk',sans-serif;
    background:#050505;
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BACKGROUND GLOW */

.bg-glow{
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#00ff8840 0%,transparent 70%);
    filter:blur(60px);
    animation:pulse 4s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

/* MAIN CARD */

.card{
    position:relative;
    width:420px;
    padding:50px 40px;
    border-radius:30px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,136,0.08);
}

/* LOGO */

.logo{
    font-size:42px;
    font-weight:700;
    letter-spacing:3px;
    margin-bottom:12px;
}

.logo span{
    color:#00ff88;
}

/* SUBTITLE */

.subtitle{
    color:#888;
    font-size:14px;
    margin-bottom:45px;
    letter-spacing:1px;
}

/* LOADER */

.loader{
    width:70px;
    height:70px;
    border-radius:50%;
    border:5px solid rgba(255,255,255,0.08);
    border-top:5px solid #00ff88;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

/* VERIFY TEXT */

.loading-text{
    margin-top:25px;
    color:#888;
    font-size:15px;
}

/* RESULT */

.result{
    display:none;
    animation:fade 0.5s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* CHECK ICON */

.check{
    font-size:90px;
    margin-bottom:20px;
}

/* VERIFIED */

.valid .check{
    color:#00ff88;
    text-shadow:0 0 30px #00ff88;
}

/* INVALID */

.invalid .check{
    color:#ff3b3b;
    text-shadow:0 0 30px #ff3b3b;
}

/* STATUS */

.status{
    font-size:30px;
    font-weight:700;
    letter-spacing:2px;
}

/* INFO */

.info{
    margin-top:12px;
    color:#999;
    font-size:14px;
}

/* STRAIN */

.strain{
    margin-top:25px;
    font-size:26px;
    font-weight:700;
    color:#00ff88;
    text-shadow:0 0 20px #00ff88;
}

/* SERIAL */

.serial{
    margin-top:18px;
    font-size:13px;
    color:#666;
    letter-spacing:2px;
}

/* FOOTER */

.footer{
    margin-top:12px;
    font-size:11px;
    color:#444;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

    <div class="logo">
        BUD<span>WAY</span>
    </div>

    <div class="subtitle">
        PREMIUM PRODUCT VERIFICATION
    </div>

    <!-- LOADING -->

    <div id="loading">

        <div class="loader"></div>

        <div class="loading-text">
            Verifying Product...
        </div>

    </div>

    <!-- RESULT -->

    <div id="result" class="result"></div>

</div>

<script>

/* SERIAL RANGES */

const strainRanges = [

    {
        start: 803541,
        end: 803542,
        strain: "Pink Starburst"
    },

    {
        start: 803547,
        end: 803559,
        strain: "Blueberry"
    },

    {
        start: 803560,
        end: 803568,
        strain: "Blue Bubblegum Gelato"
    },

    {
        start: 803569,
        end: 803584,
        strain: "Mango Sapphire"
    }

];

/* GET SERIAL FROM URL */

const params = new URLSearchParams(window.location.search);

const serial = parseInt(params.get("code"));

const resultBox = document.getElementById("result");

/* VERIFY */

setTimeout(() => {

    document.getElementById("loading").style.display = "none";

    let matchedProduct = null;

    /* CHECK RANGES */

    for (const item of strainRanges) {

        if (serial >= item.start && serial <= item.end) {

            matchedProduct = item;

            break;

        }

    }

    /* VERIFIED */

    if (matchedProduct) {

        resultBox.classList.add("valid");

        resultBox.innerHTML = `

            <div class="check">✅</div>

            <div class="status">
                VERIFIED
            </div>

            <div class="info">
                Authentic BudWay Product
            </div>

            <div class="strain">
                ${matchedProduct.strain}
            </div>

            <div class="serial">
                SERIAL ${serial}
            </div>

            <div class="footer">
                OFFICIAL BUDWAY VERIFIED PRODUCT
            </div>

        `;

    }

    /* INVALID */

    else {

        resultBox.classList.add("invalid");

        resultBox.innerHTML = `

            <div class="check">❌</div>

            <div class="status">
                INVALID
            </div>

            <div class="info">
                Serial Number Not Recognised
            </div>

            <div class="serial">
                SERIAL ${serial || "UNKNOWN"}
            </div>

        `;

    }

    resultBox.style.display = "block";

}, 2200);

</script>

</body>
</html>
