<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Ldn Verification</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#050505;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
    overflow:hidden;
}

.background-glow{
    position:fixed;
    width:320px;
    height:320px;
    background:#00ff66;
    filter:blur(140px);
    opacity:0.12;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    max-width:390px;
    background:#111;
    border:1px solid #222;
    border-radius:20px;
    padding:18px;
    text-align:center;
    box-shadow:0 0 28px rgba(0,255,100,0.12);
}

.title{
    color:#00ff66;
    font-size:28px;
    margin-bottom:6px;
}

.subtitle{
    color:#888;
    margin-bottom:16px;
    font-size:12px;
}

.loader{
    width:50px;
    height:50px;
    border-radius:50%;
    border:4px solid #222;
    border-top:4px solid #00ff66;
    margin:18px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.verified-icon{
    font-size:52px;
    color:#00ff66;
    margin-bottom:6px;
}

.invalid-icon{
    font-size:52px;
    color:#ff3b3b;
    margin-bottom:6px;
}

.status-title{
    font-size:22px;
    margin-bottom:14px;
}

.strain-card{
    margin-top:12px;
    background:#181818;
    border-radius:14px;
    padding:14px;
    border:1px solid #2b2b2b;
    text-align:left;
}

.strain-name{
    color:#00ff66;
    margin-bottom:12px;
    font-size:20px;
    line-height:1.2;
}

.strain-card p{
    margin-bottom:8px;
    line-height:1.35;
    color:#ddd;
    font-size:12.5px;
}

.strain-card strong{
    color:white;
}

.authentic-box{
    margin-top:12px;
    background:#0d2415;
    border:1px solid #00ff66;
    padding:10px;
    border-radius:10px;
    color:#92ffb7;
    text-align:center;
    font-size:11px;
    line-height:1.4;
}

.winner-box{
    margin-bottom:12px;
    padding:14px;
    border-radius:12px;
    background:linear-gradient(135deg,#00ff66,#111);
    border:2px solid gold;
    text-align:center;
    animation:pulse 1.5s infinite;
}

.winner-box h2{
    color:gold;
    margin-bottom:6px;
    font-size:15px;
    line-height:1.3;
}

.winner-box p{
    color:white;
    font-size:13px;
    font-weight:bold;
    margin-bottom:8px;
}

.discount-code{
    background:black;
    border:1px solid gold;
    border-radius:8px;
    padding:8px;
    color:gold;
    font-size:16px;
    font-weight:bold;
    letter-spacing:1px;
}

@keyframes pulse{
    0%{
        box-shadow:0 0 8px gold;
    }

    50%{
        box-shadow:0 0 18px gold;
    }

    100%{
        box-shadow:0 0 8px gold;
    }
}

.footer{
    margin-top:14px;
    color:#666;
    font-size:10px;
}

</style>
</head>

<body>

<div class="background-glow"></div>

<div class="container">

<h1 class="title">
BudWay Ldn
</h1>

<p class="subtitle">
Authenticity Verification System
</p>

<div id="result">

<div class="loader"></div>

<p style="color:#888;font-size:13px;">
Verifying Product...
</p>

</div>

<div class="footer">
© 2026 BudWay Ldn — Premium Lab Tested Flower
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

const products = [

{
    name: "Pink StarBurst Gelato 🩷",
    start: 803541,
    end: 803546,
    winner: 803542,

    genetics: "Pink Starburst X Gelato",
    thc: "20% - 26%",
    type: "50/50 Hybrid",

    flavour:
    "Sweet strawberries, citrus finish, creamy texture."
},

{
    name: "Legendary Blueberry 🫐",
    start: 803547,
    end: 803559,
    winner: 803551,

    genetics: "Afghani X Thai X Purple Thai",
    thc: "20% - 24%",
    type: "80/20 Indica Dominant",

    flavour:
    "Blueberry jam, vanilla, earthy spice, floral herbs."
},

{
    name: "Blue Bubblegum Gelato 🍬🍨",
    start: 803560,
    end: 803568,
    winner: 803564,

    genetics: "Gelato 45 X Indiana Bubblegum",
    thc: "24% - 32%",
    type: "60/40 Indica Dominant",

    flavour:
    "Sugary bubblegum, fresh berries, herbs and citrus."
},

{
    name: "Mango Sapphire 🥭",
    start: 803569,
    end: 803584,
    winner: 803578,

    genetics: "Bubba’s Gift X OG Kush X Afghan",
    thc: "21% - 23%",
    type: "85/15 Indica Dominant",

    flavour:
    "Mango, coconut, citrus fruits, lavender herbs."
}

];

function verifyProduct(){

    const result = document.getElementById("result");

    if(!code){

        result.innerHTML = `

        <div class="invalid-icon">
        ❌
        </div>

        <h2 class="status-title" style="color:#ff3b3b;">
        No Serial Number
        </h2>

        <p style="color:#aaa;font-size:13px;">
        Please enter a valid BudWay serial number.
        </p>

        `;

        return;
    }

    const serial = parseInt(code);

    const product = products.find(
        item => serial >= item.start && serial <= item.end
    );

    if(product){

        let winnerHTML = "";

        if(serial === product.winner){

            winnerHTML = `

            <div class="winner-box">

                <h2>
                You were our lucky winner! 🎉
                </h2>

                <p>
                £10 off your next order
                </p>

                <div class="discount-code">
                BW-10
                </div>

            </div>

            `;
        }

        result.innerHTML = `

        <div class="verified-icon">
        ✅
        </div>

        <h2 class="status-title" style="color:#00ff66;">
        Product Verified
        </h2>

        <div class="strain-card">

            ${winnerHTML}

            <h2 class="strain-name">
            ${product.name}
            </h2>

            <p>
            <strong>Serial:</strong>
            ${serial}
            </p>

            <p>
            <strong>Genetics:</strong>
            ${product.genetics}
            </p>

            <p>
            <strong>THC:</strong>
            ${product.thc}
            </p>

            <p>
            <strong>Type:</strong>
            ${product.type}
            </p>

            <p>
            <strong>Flavour:</strong>
            ${product.flavour}
            </p>

            <div class="authentic-box">

            Authentic BudWay Ldn Product Verified

            </div>

        </div>

        `;

    } else {

        result.innerHTML = `

        <div class="invalid-icon">
        ❌
        </div>

        <h2 class="status-title" style="color:#ff3b3b;">
        Verification Failed
        </h2>

        <p style="color:#aaa;font-size:13px;">
        Serial number not found in database.
        </p>

        `;
    }
}

setTimeout(verifyProduct,1200);

</script>

</body>
</html>
