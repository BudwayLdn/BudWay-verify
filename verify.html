<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Verification</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#020202;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    padding:12px;
}

.background-glow{
    position:absolute;
    width:650px;
    height:650px;
    background:#00ff88;
    border-radius:50%;
    filter:blur(180px);
    opacity:0.08;
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    max-width:360px;
    background:rgba(10,10,10,0.92);
    border:1px solid rgba(0,255,136,0.12);
    border-radius:24px;
    padding:22px 16px;
    backdrop-filter:blur(16px);
    box-shadow:
    0 0 30px rgba(0,255,136,0.06),
    inset 0 0 16px rgba(255,255,255,0.02);
    text-align:center;
}

.logo{
    font-size:48px;
    font-weight:900;
    margin-bottom:4px;
    letter-spacing:2px;
}

.logo-white{
    color:#ffffff;
}

.logo-green{
    color:#00ff88;
    text-shadow:0 0 14px #00ff88;
}

.subtitle{
    color:#7d7d7d;
    font-size:10px;
    letter-spacing:2px;
    margin-bottom:26px;
}

.icon{
    font-size:78px;
    margin-bottom:10px;
    filter:drop-shadow(0 0 16px #00ff88);
}

.status{
    font-size:34px;
    font-weight:900;
    letter-spacing:2px;
    margin-bottom:6px;
}

.message{
    color:#b8b8b8;
    font-size:13px;
    margin-bottom:20px;
}

.strain-name{
    font-size:24px;
    font-weight:800;
    color:#00ff88;
    text-shadow:0 0 10px #00ff88;
    margin-bottom:10px;
}

.strain-description{
    color:#b8b8b8;
    font-size:9px;
    line-height:1.45;
    text-align:left;
    margin-bottom:12px;
}

.info-card{
    background:rgba(255,255,255,0.025);
    border:1px solid rgba(0,255,136,0.08);
    border-radius:14px;
    padding:7px 10px;
    margin-bottom:14px;
}

.info-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
    padding:5px 0;
    border-bottom:1px solid rgba(255,255,255,0.04);
}

.info-row:last-child{
    border-bottom:none;
}

.label{
    color:#00ff88;
    font-size:8px;
    font-weight:700;
    letter-spacing:1px;
    white-space:nowrap;
}

.value{
    color:#d5d5d5;
    font-size:8px;
    line-height:1.35;
    text-align:right;
    max-width:62%;
}

.serial{
    color:#7a7a7a;
    font-size:11px;
    letter-spacing:2px;
    margin-bottom:8px;
}

.footer{
    color:#5a5a5a;
    font-size:9px;
    letter-spacing:1px;
}

.invalid-section{
    display:none;
}

.invalid{
    color:red;
}

.invalid-icon{
    font-size:78px;
    margin-bottom:10px;
    filter:drop-shadow(0 0 16px red);
}

</style>
</head>

<body>

<div class="background-glow"></div>

<div class="container">

<div class="logo">
<span class="logo-white">BUD</span><span class="logo-green">WAY</span>
</div>

<div class="subtitle">
OFFICIAL PRODUCT AUTHENTICATION
</div>

<div id="verifiedSection">

<div class="icon">✅</div>

<div class="status">
VERIFIED
</div>

<div class="message">
Authentic BudWay Cultivar
</div>

<div class="strain-name" id="strainName"></div>

<div class="strain-description" id="strainDescription"></div>

<div class="info-card">

<div class="info-row">
<div class="label">TYPE</div>
<div class="value" id="strainType"></div>
</div>

<div class="info-row">
<div class="label">THC</div>
<div class="value" id="strainTHC"></div>
</div>

<div class="info-row">
<div class="label">GENETICS</div>
<div class="value" id="strainLineage"></div>
</div>

<div class="info-row">
<div class="label">FLAVOUR</div>
<div class="value" id="strainFlavour"></div>
</div>

<div class="info-row">
<div class="label">TERPENES</div>
<div class="value" id="strainTerpenes"></div>
</div>

<div class="info-row">
<div class="label">EFFECTS</div>
<div class="value" id="strainEffects"></div>
</div>

</div>

<div class="serial" id="serialNumber"></div>

<div class="footer">
LAB VERIFIED • SMALL BATCH CULTIVAR
</div>

</div>

<div id="invalidSection" class="invalid-section">

<div class="invalid-icon">❌</div>

<div class="status invalid">
INVALID
</div>

<div class="message">
Product could not be authenticated
</div>

</div>

</div>

<script>

const strains = [

{
name:"Pink Starburst 🌸",
start:803541,
end:803546,
type:"Balanced Hybrid",
thc:"28–32%",
lineage:"Pink Runtz × Starburst Candy",
flavour:"Candy gas, creamy berries",
terpenes:"Limonene • Caryophyllene",
effects:"Euphoric • Relaxing",
description:"Premium candy-gas hybrid with creamy berry undertones and dense crystal-coated flowers."
},

{
name:"Blueberry 🫐",
start:803547,
end:803559,
type:"Indica Dominant",
thc:"24–29%",
lineage:"Afghani × Thai",
flavour:"Blueberry, earth, pine",
terpenes:"Myrcene • Pinene",
effects:"Relaxing • Sedating",
description:"Legendary indica cultivar recognised for its sweet berry aroma and calming effects."
},

{
name:"Blue Bubblegum Gelato 🫧",
start:803560,
end:803568,
type:"Exotic Hybrid",
thc:"30–33%",
lineage:"Bubblegum Gelato × Blue Zushi",
flavour:"Bubblegum, cream, diesel",
terpenes:"Limonene • Humulene",
effects:"Creative • Euphoric",
description:"Creamy dessert terps blended with exotic gas for a balanced uplifting experience."
},

{
name:"Mango Sapphire 🥭",
start:803569,
end:803584,
type:"Sativa Hybrid",
thc:"29–34%",
lineage:"Mango Haze × Sapphire OG",
flavour:"Mango, citrus, fuel",
terpenes:"Terpinolene • Ocimene",
effects:"Energetic • Focused",
description:"Tropical mango terpenes layered with citrus zest and powerful euphoric effects."
}

];

const params = new URLSearchParams(window.location.search);

const code = parseInt(params.get("code"));

const verifiedSection = document.getElementById("verifiedSection");
const invalidSection = document.getElementById("invalidSection");

let matchedStrain = null;

for(let strain of strains){

if(code >= strain.start && code <= strain.end){
matchedStrain = strain;
break;
}

}

if(matchedStrain){

document.getElementById("strainName").innerText =
matchedStrain.name;

document.getElementById("strainDescription").innerText =
matchedStrain.description;

document.getElementById("strainType").innerText =
matchedStrain.type;

document.getElementById("strainTHC").innerText =
matchedStrain.thc;

document.getElementById("strainLineage").innerText =
matchedStrain.lineage;

document.getElementById("strainFlavour").innerText =
matchedStrain.flavour;

document.getElementById("strainTerpenes").innerText =
matchedStrain.terpenes;

document.getElementById("strainEffects").innerText =
matchedStrain.effects;

document.getElementById("serialNumber").innerText =
"SERIAL " + code;

}else{

verifiedSection.style.display = "none";
invalidSection.style.display = "block";

}

</script>

</body>
</html>
