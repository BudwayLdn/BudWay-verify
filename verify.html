<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Ldn Verification</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050505;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.background-glow{
    position:absolute;
    width:500px;
    height:500px;
    background:#00ff66;
    filter:blur(180px);
    opacity:0.12;
}

.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:520px;
    background:#111;
    border:1px solid #222;
    border-radius:24px;
    padding:35px;
    text-align:center;
    box-shadow:0 0 35px rgba(0,255,100,0.15);
}

.logo{
    width:95px;
    margin-bottom:20px;
}

.title{
    color:#00ff66;
    font-size:34px;
    margin-bottom:10px;
}

.subtitle{
    color:#999;
    margin-bottom:30px;
}

.loader{
    width:70px;
    height:70px;
    border-radius:50%;
    border:5px solid #222;
    border-top:5px solid #00ff66;
    margin:25px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.verified-icon{
    font-size:72px;
    color:#00ff66;
    margin-bottom:15px;
}

.invalid-icon{
    font-size:72px;
    color:#ff3b3b;
    margin-bottom:15px;
}

.strain-card{
    margin-top:25px;
    background:#181818;
    border-radius:18px;
    padding:25px;
    border:1px solid #2d2d2d;
    text-align:left;
}

.strain-name{
    color:#00ff66;
    margin-bottom:20px;
    font-size:28px;
}

.strain-card p{
    margin-bottom:14px;
    line-height:1.6;
    color:#ddd;
}

.strain-card strong{
    color:white;
}

.authentic-box{
    margin-top:22px;
    background:#0d2415;
    border:1px solid #00ff66;
    padding:15px;
    border-radius:14px;
    color:#92ffb7;
    text-align:center;
}

.winner-box{
    margin-top:20px;
    padding:18px;
    border-radius:16px;
    background:linear-gradient(135deg,#00ff66,#111);
    border:2px solid gold;
    text-align:center;
    animation:pulse 1.6s infinite;
}

.winner-box h2{
    color:gold;
    margin-bottom:10px;
    font-size:22px;
}

.winner-box p{
    color:white;
    font-size:18px;
    font-weight:bold;
}

@keyframes pulse{
    0%{
        box-shadow:0 0 8px gold;
    }

    50%{
        box-shadow:0 0 24px gold;
    }

    100%{
        box-shadow:0 0 8px gold;
    }
}

.footer{
    margin-top:28px;
    color:#666;
    font-size:13px;
}

</style>
</head>

<body>

<div class="background-glow"></div>

<div class="container">

<h1 class="title">BudWay Ldn</h1>

<p class="subtitle">
Authenticity Verification System
</p>

<div id="result">

<div class="loader"></div>

<p style="color:#999;">
Verifying Product...
</p>

</div>

<div class="footer">
© 2026 BudWay Ldn — Premium Lab Tested Flower
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

const products = [

{
    name: "Pink StarBurst Gelato 🇺🇸",
    start: 803541,
    end: 803546,
    winner: 803542,

    genetics: "Pink Starburst X Gelato",
    thc: "20% - 26%",
    type: "50/50 Hybrid",

    flavour:
    "Candy-like sweetness with juicy strawberries, zesty citrus finish, and a creamy smooth texture."
},

{
    name: "Legendary Blueberry 🫐",
    start: 803547,
    end: 803559,
    winner: 803551,

    genetics: "Afghani X Thai X Purple Thai",
    thc: "20% - 24%",
    type: "80/20 Indica Dominant",

    flavour:
    "Sweet blueberry, berry jam, vanilla, earthy spice, and floral/herbal undertones."
},

{
    name: "Blue Bubblegum Gelato 🔥",
    start: 803560,
    end: 803568,
    winner: 803564,

    genetics: "Gelato 45 X Indiana Bubblegum",
    thc: "24% - 32%",
    type: "60/40 Indica Dominant",

    flavour:
    "Sugary bubblegum, fresh berries, with subtle herbal and citrus undertones."
},

{
    name: "Mango Sapphire 🥭",
    start: 803569,
    end: 803584,
    winner: 803578,

    genetics: "Bubba’s Gift X OG Kush X Afghan",
    thc: "21% - 23%",
    type: "85/15 Indica Dominant",

    flavour:
    "Tropical cocktail flavours with mango, coconut, citrus sour fruits, lavender, and spicy herbs."
}

];

function verifyProduct(){

    const result = document.getElementById("result");

    if(!code){

        result.innerHTML = `

        <div class="invalid-icon">❌</div>

        <h2>No Serial Number Entered</h2>

        <p style="margin-top:15px;color:#aaa;">
        Please enter a valid BudWay serial number.
        </p>

        `;

        return;
    }

    const serial = parseInt(code);

    const product = products.find(
        item => serial >= item.start && serial <= item.end
    );

    if(product){

        let winnerHTML = "";

        if(serial === product.winner){

            winnerHTML = `

            <div class="winner-box">

                <h2>
                You were our lucky winner for this strain! 🎉🎉🎉
                </h2>

                <p>
                — £10 off your Next Order!
                </p>

            </div>

            `;
        }

        result.innerHTML = `

        <div class="verified-icon">
        ✅
        </div>

        <h2 style="color:#00ff66;">
        Product Verified
        </h2>

        <div class="strain-card">

            <h2 class="strain-name">
            ${product.name}
            </h2>

            <p>
            <strong>Serial Number:</strong>
            ${serial}
            </p>

            <p>
            <strong>Genetics:</strong>
            ${product.genetics}
            </p>

            <p>
            <strong>THC:</strong>
            ${product.thc}
            </p>

            <p>
            <strong>Type:</strong>
            ${product.type}
            </p>

            <p>
            <strong>Flavour Profile:</strong>
            ${product.flavour}
            </p>

            ${winnerHTML}

            <div class="authentic-box">

            This product is authentic and officially verified
            by BudWay Ldn.

            </div>

        </div>

        `;

    } else {

        result.innerHTML = `

        <div class="invalid-icon">
        ❌
        </div>

        <h2 style="color:#ff3b3b;">
        Verification Failed
        </h2>

        <p style="margin-top:15px;color:#aaa;">
        This serial number is not registered in the
        BudWay Ldn authenticity database.
        </p>

        `;
    }
}

setTimeout(verifyProduct, 1800);

</script>

</body>
</html>
