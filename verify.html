<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BudWay Ldn Verification</title>

<style>
body{
    margin:0;
    padding:0;
    background:#050505;
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:500px;
    background:#111;
    border:2px solid #21d07a;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 25px rgba(33,208,122,0.3);
}

.logo{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
    color:#21d07a;
}

.subtitle{
    color:#bbb;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    margin-bottom:20px;
    outline:none;
    background:#1c1c1c;
    color:white;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#21d07a;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.result{
    margin-top:30px;
    display:none;
    padding:20px;
    border-radius:16px;
    background:#181818;
}

.valid{
    border:2px solid #21d07a;
}

.invalid{
    border:2px solid red;
}

.strain{
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

.info{
    margin:8px 0;
    color:#ccc;
}

.winner{
    margin-top:20px;
    background:gold;
    color:black;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
}

#loader{
    display:none;
    margin-top:20px;
}

.spinner{
    width:45px;
    height:45px;
    border:4px solid #333;
    border-top:4px solid #21d07a;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">BUDWAY LDN</div>
    <div class="subtitle">Premium Cannabis Verification System</div>

    <input type="number" id="serialInput" placeholder="Enter Serial Number">

    <button onclick="verifySerial()">VERIFY PRODUCT</button>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div id="result" class="result"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    updateDoc,
    increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

    apiKey: "YOUR_API_KEY",

    authDomain: "YOUR_PROJECT.firebaseapp.com",

    projectId: "YOUR_PROJECT_ID",

    storageBucket: "YOUR_PROJECT.appspot.com",

    messagingSenderId: "YOUR_SENDER_ID",

    appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


/* =========================
   STRAIN DATA
========================= */

const strains = [

{
    name: "Pink StarBurst Gelato",
    start: 803541,
    end: 803542,
    thc: "20-26%",
    flavour: "Candy Strawberry Citrus Cream",
    winner: 803542
},

{
    name: "Legendary Blueberry",
    start: 803547,
    end: 803559,
    thc: "20-24%",
    flavour: "Blueberry Jam Vanilla Spice",
    winner: 803551
},

{
    name: "Blue Bubblegum Gelato",
    start: 803560,
    end: 803568,
    thc: "24-32%",
    flavour: "Bubblegum Berry Citrus",
    winner: 803564
},

{
    name: "Mango Sapphire",
    start: 803569,
    end: 803584,
    thc: "21-23%",
    flavour: "Tropical Mango Coconut",
    winner: 803578
}

];


/* =========================
   VERIFY FUNCTION
========================= */

window.verifySerial = async function () {

    const serial = Number(document.getElementById("serialInput").value);

    const result = document.getElementById("result");

    const loader = document.getElementById("loader");

    result.style.display = "none";

    loader.style.display = "block";


    await new Promise(resolve => setTimeout(resolve, 1500));

    loader.style.display = "none";


    let matchedStrain = null;

    for (const strain of strains) {

        if (serial >= strain.start && serial <= strain.end) {

            matchedStrain = strain;

            break;

        }

    }


    /* =========================
       INVALID SERIAL
    ========================= */

    if (!matchedStrain) {

        result.className = "result invalid";

        result.innerHTML = `

            <h2>❌ INVALID SERIAL</h2>

            <p>This product is not authentic.</p>

        `;

        result.style.display = "block";

        return;

    }


    /* =========================
       FIREBASE SAVE
    ========================= */

    const serialRef = doc(db, "serials", String(serial));

    const serialSnap = await getDoc(serialRef);

    let firstVerified = "";

    let verifyCount = 1;


    // IF FIRST EVER SCAN
    if (!serialSnap.exists()) {

        firstVerified = new Date().toLocaleString();

        await setDoc(serialRef, {

            serial: serial,

            strain: matchedStrain.name,

            firstVerified: firstVerified,

            verifyCount: 1

        });

    }

    // IF SERIAL ALREADY EXISTS
    else {

        const data = serialSnap.data();

        firstVerified = data.firstVerified;

        verifyCount = (data.verifyCount || 1) + 1;

        // ONLY UPDATE VERIFY COUNT
        await updateDoc(serialRef, {

            verifyCount: increment(1)

        });

    }


    /* =========================
       VALID SERIAL DISPLAY
    ========================= */

    result.className = "result valid";

    result.innerHTML = `

        <div class="strain">
            ✅ ${matchedStrain.name}
        </div>

        <div class="info">
            THC: ${matchedStrain.thc}
        </div>

        <div class="info">
            Flavour: ${matchedStrain.flavour}
        </div>

        <div class="info">
            Serial: ${serial}
        </div>

        <div class="info">
            First Verified: ${firstVerified}
        </div>

        <div class="info">
            Total Scans: ${verifyCount}
        </div>

    `;


    /* =========================
       WINNER SYSTEM
    ========================= */

    if (serial === matchedStrain.winner) {

        result.innerHTML += `

            <div class="winner">

                🎉 YOU WERE OUR LUCKY WINNER 🎉
                <br><br>
                £10 OFF YOUR NEXT ORDER
                <br><br>
                CODE: <b>BW-10</b>

            </div>

        `;

    }

    result.style.display = "block";

};

</script>

</body>
</html>
