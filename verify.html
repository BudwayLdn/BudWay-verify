<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Ldn Verification</title>

<style>

body{
    margin:0;
    padding:0;
    background:#050505;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:550px;
    background:#111;
    border:1px solid #222;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,255,100,0.15);
}

h1,h2{
    margin-top:0;
}

.verified{
    color:#00ff66;
    font-size:32px;
    text-align:center;
}

.invalid{
    color:#ff4d4d;
    font-size:32px;
    text-align:center;
}

.card{
    margin-top:25px;
    background:#181818;
    border-radius:16px;
    padding:22px;
    border:1px solid #2d2d2d;
}

.card p{
    line-height:1.6;
    color:#ddd;
}

strong{
    color:white;
}

.winner-box{
    margin-top:20px;
    padding:20px;
    border-radius:16px;
    background:linear-gradient(135deg,#00ff66,#111);
    border:2px solid gold;
    text-align:center;
    animation:pulse 1.5s infinite;
}

.winner-box h3{
    color:gold;
    margin-bottom:10px;
}

.authentic{
    margin-top:20px;
    padding:14px;
    background:#0f2417;
    border:1px solid #00ff66;
    border-radius:12px;
    color:#9fffc1;
}

.loading{
    text-align:center;
    font-size:20px;
    color:#aaa;
}

@keyframes pulse{
    0%{
        box-shadow:0 0 8px gold;
    }
    50%{
        box-shadow:0 0 25px gold;
    }
    100%{
        box-shadow:0 0 8px gold;
    }
}

</style>
</head>

<body>

<div class="container">

<div id="result">

<div class="loading">
Verifying Product...
</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

const strains = [

{
    name: "Pink StarBurst Gelato 🇺🇸",
    start: 803541,
    end: 803546,
    winner: 803542,
    genetics: "Pink Starburst X Gelato",
    thc: "20% - 26%",
    type: "50/50 Hybrid",
    flavour: "Candy-like sweetness with juicy strawberries, zesty citrus, and a creamy smooth finish."
},

{
    name: "Legendary Blueberry 🫐",
    start: 803547,
    end: 803559,
    winner: 803551,
    genetics: "Afghani X Thai X Purple Thai",
    thc: "20% - 24%",
    type: "80/20 Indica Dominant",
    flavour: "Sweet blueberry, berry jam, vanilla, earthy spice, and floral/herbal undertones."
},

{
    name: "Blue Bubblegum Gelato 🔥",
    start: 803560,
    end: 803568,
    winner: 803564,
    genetics: "Gelato 45 X Indiana Bubblegum",
    thc: "24% - 32%",
    type: "60/40 Indica Dominant",
    flavour: "Sugary bubblegum, fresh berries, with subtle herbal and citrus undertones."
},

{
    name: "Mango Sapphire 🥭",
    start: 803569,
    end: 803584,
    winner: 803578,
    genetics: "Bubba’s Gift X OG Kush X Afghan",
    thc: "21% - 23%",
    type: "85/15 Indica Dominant",
    flavour: "Tropical cocktail flavours with mango, coconut, citrus sour fruits, lavender, and spicy herbs."
}

];

function verifyProduct(){

    const result = document.getElementById("result");

    if(!code){

        result.innerHTML = `

        <div class="invalid">
        ❌
        </div>

        <div class="card">

        <h2>No Serial Number Entered</h2>

        <p>
        Please scan a valid BudWay Ldn package QR code.
        </p>

        </div>

        `;

        return;
    }

    const serial = parseInt(code);

    const strain = strains.find(
        item => serial >= item.start && serial <= item.end
    );

    if(strain){

        let winnerHTML = "";

        if(serial === strain.winner){

            winnerHTML = `

            <div class="winner-box">

            <h3>
            You were our lucky winner for this strain! 🎉🎉🎉
            </h3>

            <p>
            — £10 off your Next Order!
            </p>

            </div>

            `;
        }

        result.innerHTML = `

        <div class="verified">
        ✅
        </div>

        <div class="card">

        <h2>${strain.name}</h2>

        <p>
        <strong>Serial Number:</strong>
        ${serial}
        </p>

        <p>
        <strong>Genetics:</strong>
        ${strain.genetics}
        </p>

        <p>
        <strong>THC:</strong>
        ${strain.thc}
        </p>

        <p>
        <strong>Type:</strong>
        ${strain.type}
        </p>

        <p>
        <strong>Flavour Profile:</strong>
        ${strain.flavour}
        </p>

        ${winnerHTML}

        <div class="authentic">

        This product is authentic and officially verified
        by BudWay Ldn.

        </div>

        </div>

        `;

    } else {

        result.innerHTML = `

        <div class="invalid">
        ❌
        </div>

        <div class="card">

        <h2>Verification Failed</h2>

        <p>
        This serial number is not registered in the
        BudWay Ldn authenticity database.
        </p>

        </div>

        `;
    }
}

setTimeout(verifyProduct, 1500);

</script>

</body>
</html>
