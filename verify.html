<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Ldn Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#00ff88;
--secondary:#ffd700;
--bg:#050505;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:white;
overflow-x:hidden;
min-height:100vh;
position:relative;
transition:background .5s ease;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,var(--primary) 0%,transparent 30%),
radial-gradient(circle at bottom right,var(--secondary) 0%,transparent 30%);
opacity:.18;
z-index:-2;
}

.grid{
position:fixed;
inset:0;
background:
linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
background-size:40px 40px;
z-index:-1;
}

.container{
max-width:430px;
margin:auto;
padding:18px;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:100%;
background:rgba(10,10,10,.92);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:30px;
padding:28px;
position:relative;
overflow:hidden;
transition:.5s ease;
box-shadow:
0 0 40px rgba(0,0,0,.8),
0 0 40px color-mix(in srgb,var(--primary) 30%, transparent);
}

.glow{
position:absolute;
width:260px;
height:260px;
border-radius:50%;
background:radial-gradient(circle,var(--primary),transparent 70%);
top:-120px;
right:-120px;
opacity:.25;
filter:blur(25px);
}

.logo-wrap{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:14px;
}

.main-logo{
width:200px;
max-width:100%;
object-fit:contain;
}

.subtitle{
text-align:center;
font-size:.82rem;
color:#a0a0a0;
margin-bottom:28px;
}

.loader{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:24px;
transition:.4s ease;
}

.loader-ring{
width:72px;
height:72px;
border-radius:50%;
border:3px solid rgba(255,255,255,.08);
border-top:3px solid var(--primary);
animation:spin 1s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.serial-box{
background:#111;
padding:16px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
text-align:center;
margin-bottom:18px;
}

.serial-label{
font-size:.72rem;
letter-spacing:1px;
color:var(--primary);
margin-bottom:6px;
}

.serial{
font-family:'Orbitron',sans-serif;
font-size:1.4rem;
font-weight:700;
}

.status{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:14px;
border-radius:14px;
background:linear-gradient(90deg,color-mix(in srgb,var(--primary) 25%, black),#111);
border:1px solid var(--primary);
margin-bottom:22px;
font-weight:700;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
background:var(--primary);
box-shadow:0 0 15px var(--primary);
}

.strain-card{
background:linear-gradient(180deg,#111,#090909);
padding:22px;
border-radius:24px;
border:1px solid rgba(255,255,255,.06);
}

.strain-title{
font-family:'Orbitron',sans-serif;
font-size:1.5rem;
margin-bottom:8px;
color:var(--primary);
}

.desc{
font-size:.9rem;
color:#c0c0c0;
line-height:1.5;
}

.meta-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.meta{
background:#101010;
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,.05);
}

.meta span{
display:block;
font-size:.7rem;
color:#888;
margin-bottom:5px;
}

.cert{
margin-top:22px;
padding:16px;
border-radius:18px;
text-align:center;
background:linear-gradient(90deg,#151515,#0c0c0c);
border:1px solid rgba(255,255,255,.08);
}

.fake-warning{
display:none;
margin-top:20px;
padding:18px;
border-radius:18px;
background:#220000;
border:1px solid #ff3b3b;
text-align:center;
color:#ff7b7b;
}

.emoji{
position:fixed;
top:-120px;
font-size:56px;
pointer-events:none;
animation:rain linear forwards;
z-index:9999;
opacity:.95;
}

@keyframes rain{

0%{
transform:
translateY(-120px)
rotate(0deg)
scale(.8);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:
translateY(120vh)
rotate(360deg)
scale(1.4);
opacity:0;
}

}

/* EXOTIC INTRO */

.logo-flash{

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%)
scale(.5);

width:280px;

z-index:99998;

opacity:0;

pointer-events:none;

animation:logoFlash 2.5s ease forwards;

filter:
drop-shadow(0 0 25px gold)
drop-shadow(0 0 60px #FFD700);

}

@keyframes logoFlash{

0%{
opacity:0;
transform:
translate(-50%,-50%)
scale(.4);
}

20%{
opacity:1;
transform:
translate(-50%,-50%)
scale(1);
}

60%{
opacity:1;
transform:
translate(-50%,-50%)
scale(1.08);
}

100%{
opacity:0;
transform:
translate(-50%,-50%)
scale(1.3);
}

}

.exotic-text{

position:fixed;

top:62%;
left:50%;

transform:translateX(-50%);

z-index:99998;

font-family:'Orbitron',sans-serif;

font-size:1.1rem;

letter-spacing:6px;

color:#FFD700;

opacity:0;

animation:fadeExotic 2.5s ease forwards;

text-shadow:
0 0 12px #FFD700,
0 0 25px gold;

}

@keyframes fadeExotic{

0%{
opacity:0;
transform:
translateX(-50%)
translateY(10px);
}

20%{
opacity:1;
transform:
translateX(-50%)
translateY(0px);
}

80%{
opacity:1;
}

100%{
opacity:0;
transform:
translateX(-50%)
translateY(-8px);
}

}

.rocket-launch{
position:fixed;
bottom:-180px;
left:50%;
transform:translateX(-50%);
font-size:90px;
z-index:99999;
pointer-events:none;

animation:rocketLaunch 2.8s ease-in forwards;

filter:
drop-shadow(0 0 15px #FFD700)
drop-shadow(0 0 35px #ffae00);
}

@keyframes rocketLaunch{

0%{
transform:
translateX(-50%)
translateY(0)
scale(.7);
opacity:0;
}

10%{
opacity:1;
}

40%{
transform:
translateX(-50%)
translateY(-35vh)
scale(1);
}

70%{
transform:
translateX(-50%)
translateY(-80vh)
scale(1.15);
opacity:1;
}

100%{
transform:
translateX(-50%)
translateY(-140vh)
scale(1.4);
opacity:0;
}

}

</style>
</head>

<body>

<div class="grid"></div>

<img 
src="budway-b.jpeg.PNG"
id="logoFlash"
class="logo-flash"
style="display:none;"
>

<div id="exoticText"
class="exotic-text"
style="display:none;">
EXOTIC DROP
</div>

<div 
id="rocketLaunch"
class="rocket-launch"
style="display:none;"
>
🚀
</div>

<div class="container">

<div class="card">

<div class="glow"></div>

<div class="logo-wrap">

<img 
src="budway-b.jpeg.PNG"
class="main-logo"
alt="BudWay Ldn Logo"
>

</div>

<div class="subtitle">
Premium Authenticity Verification System
</div>

<div class="loader">
<div class="loader-ring"></div>
</div>

<div id="realContent" style="display:none;">

<div class="serial-box">
<div class="serial-label">VERIFIED SERIAL</div>
<div class="serial" id="serialNumber"></div>
</div>

<div class="status">
<div class="dot"></div>
AUTHENTIC PRODUCT VERIFIED
</div>

<div class="strain-card">

<div class="strain-title" id="strainName"></div>

<div class="desc" id="genetics"></div>

<div class="meta-grid">

<div class="meta">
<span>THC LEVEL</span>
<strong id="thc"></strong>
</div>

<div class="meta">
<span>TYPE</span>
<strong id="type"></strong>
</div>

<div class="meta">
<span>FLAVOUR</span>
<strong id="flavour"></strong>
</div>

<div class="meta">
<span>BATCH</span>
<strong>DROP 01</strong>
</div>

</div>

<div class="cert">

<div style="margin-bottom:8px;color:var(--secondary);">
LAB VERIFIED AUTHENTIC
</div>

<strong>
BudWay Certified Premium Flower
</strong>

</div>

<div class="fake-warning" id="fakeBox">

<h3>⚠ INVALID SERIAL</h3>

<p>
This BudWay product could not be verified.
</p>

</div>

</div>

</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const serial = params.get("code");

const strains = [

{
name:"Guava Cake",
start:803601,
end:803632,
emojis:["🥭","🍈","🍍","🍓","🥝","🍑"],
genetics:"Guava x Wedding Cake/Cake genetics",
thc:"22–30%",
type:"Indica-Leaning Hybrid",
flavour:"Tropical Guava Vanilla Cake Creamy Citrus Candy Light Gas",
primary:"#FF9F5A",
secondary:"#7CFFB2",
bg:"#140d08"
},

{
name:"Lemon Cherry Gelato",
start:803633,
end:803648,
emojis:["🚀","✨","💎","🔥","👑"],
genetics:"Sunset Sherbet × Girl Scout Cookies",
thc:"24–30%",
type:"Exotic Luxury Hybrid",
flavour:"Cherry Candy • Citrus • Creamy Gas",
primary:"#FFD700",
secondary:"#ff5e57",
bg:"#120909"
}

];

let found = null;

for(let strain of strains){

if(serial >= strain.start && serial <= strain.end){

found = strain;

}

}

if(!found){

document.querySelector('.loader').style.display='none';

document.getElementById('realContent').style.display='block';

document.querySelector('.status').style.display='none';

document.querySelector('.strain-card').style.display='none';

document.getElementById('fakeBox').style.display='block';

}

else{

document.documentElement.style.setProperty('--primary',found.primary);

document.documentElement.style.setProperty('--secondary',found.secondary);

document.body.style.background = found.bg;

document.getElementById('serialNumber').innerText = serial;

document.getElementById('strainName').innerText = found.name;

document.getElementById('genetics').innerText = found.genetics;

document.getElementById('thc').innerText = found.thc;

document.getElementById('type').innerText = found.type;

document.getElementById('flavour').innerText = found.flavour;

function createEmoji(){

const emoji = document.createElement("div");

emoji.className = "emoji";

emoji.innerText =
found.emojis[
Math.floor(Math.random() * found.emojis.length)
];

emoji.style.left = Math.random() * 100 + "vw";

emoji.style.animationDuration =
(2 + Math.random() * 2) + "s";

document.body.appendChild(emoji);

setTimeout(()=>{

emoji.remove();

},5000);

}

setInterval(createEmoji,180);

/* EXOTIC INTRO FIRST */

if(found.name === "Lemon Cherry Gelato"){

const rocket =
document.getElementById("rocketLaunch");

const logo =
document.getElementById("logoFlash");

const exoticText =
document.getElementById("exoticText");

document.querySelector('.card').style.filter = "blur(8px)";
document.querySelector('.loader').style.opacity = "0";

rocket.style.display = "block";

logo.style.display = "block";

exoticText.style.display = "block";

setTimeout(()=>{

rocket.style.display = "none";

logo.style.display = "none";

exoticText.style.display = "none";

document.querySelector('.card').style.filter = "blur(0px)";

document.querySelector('.loader').style.opacity = "1";

setTimeout(()=>{

document.querySelector('.loader').style.display='none';

document.getElementById('realContent').style.display='block';

},1800);

},2600);

}

/* NORMAL STRAINS */

else{

setTimeout(()=>{

document.querySelector('.loader').style.display='none';

document.getElementById('realContent').style.display='block';

},1800);

}

}

</script>

</body>
</html>
