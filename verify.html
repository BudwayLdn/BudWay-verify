<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Space Grotesk',sans-serif;
    background:#040404;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.bg{
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#00ff8840 0%,transparent 70%);
    filter:blur(60px);
    animation:pulse 4s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.1);
    }
}

.card{
    position:relative;
    width:420px;
    padding:45px;
    border-radius:28px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,136,0.08);
}

.logo{
    font-size:42px;
    font-weight:700;
    letter-spacing:3px;
    margin-bottom:12px;
}

.logo span{
    color:#00ff88;
}

.subtitle{
    color:#888;
    margin-bottom:40px;
}

.loader{
    width:70px;
    height:70px;
    border:5px solid rgba(255,255,255,0.08);
    border-top:5px solid #00ff88;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.result{
    display:none;
    animation:fade 0.5s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.check{
    font-size:90px;
    margin-bottom:20px;
}

.valid .check{
    color:#00ff88;
    text-shadow:0 0 30px #00ff88;
}

.invalid .check{
    color:#ff3b3b;
    text-shadow:0 0 30px #ff3b3b;
}

.status{
    font-size:30px;
    font-weight:700;
}

.info{
    margin-top:12px;
    color:#999;
    font-size:14px;
}

.serial{
    margin-top:18px;
    font-size:13px;
    color:#666;
    letter-spacing:2px;
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="card">

    <div class="logo">
        BUD<span>WAY</span>
    </div>

    <div class="subtitle">
        Authenticity Verification
    </div>

    <div id="loading">

        <div class="loader"></div>

        <div style="margin-top:25px;color:#888;">
            Verifying Product...
        </div>

    </div>

    <div id="result" class="result"></div>

</div>

<script>

const validCodes = [
    "BW-4729-XK",
    "BW-9281-QP",
    "BW-6631-ZT",
    "BUDWAY-2026"
];

const params = new URLSearchParams(window.location.search);

const serial = params.get("code");

const resultBox = document.getElementById("result");

setTimeout(()=>{

    document.getElementById("loading").style.display = "none";

    if(validCodes.includes(serial)){

        resultBox.classList.add("valid");

        resultBox.innerHTML = `
            <div class="check">✅</div>
            <div class="status">VERIFIED</div>
            <div class="info">
                Authentic BudWay Product
            </div>
            <div class="serial">
                ${serial}
            </div>
        `;

    }else{

        resultBox.classList.add("invalid");

        resultBox.innerHTML = `
            <div class="check">❌</div>
            <div class="status">INVALID</div>
            <div class="info">
                Serial Number Not Recognised
            </div>
            <div class="serial">
                ${serial || "NO CODE"}
            </div>
        `;

    }

    resultBox.style.display = "block";

},2200);

</script>

</body>
</html>
