<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#050505;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* LIGHTER BACKGROUND */

.glow1,
.glow2{
position:fixed;
border-radius:50%;
pointer-events:none;
z-index:0;
opacity:0.12;
}

.glow1{
width:220px;
height:220px;
background:#00ff88;
top:-80px;
left:-80px;
filter:blur(80px);
}

.glow2{
width:200px;
height:200px;
background:#d4af37;
bottom:-80px;
right:-80px;
filter:blur(80px);
}

/* MAIN CARD */

.container{
position:relative;
z-index:2;
width:92%;
max-width:380px;
background:#0d0d0d;
border:1px solid rgba(0,255,136,0.14);
border-radius:22px;
padding:16px;
box-shadow:
0 0 16px rgba(0,255,136,0.08);
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:16px;
}

.logo h1{
font-size:1.9rem;
font-weight:900;
letter-spacing:2px;
color:#00ff88;
text-shadow:0 0 8px rgba(0,255,136,0.25);
}

.logo span{
color:#d4af37;
}

/* LOADER */

.loader{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:48px 0;
}

.spinner{
width:50px;
height:50px;
border-radius:50%;
border:4px solid #1d1d1d;
border-top:4px solid #00ff88;
animation:spin 0.7s linear infinite;
margin-bottom:14px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loading-text{
font-size:0.9rem;
color:#aaa;
}

/* RESULT */

.result{
display:none;
animation:fade 0.25s ease;
}

@keyframes fade{
from{
opacity:0;
}
to{
opacity:1;
}
}

.status{
padding:12px;
border-radius:14px;
font-weight:800;
text-align:center;
margin-bottom:12px;
font-size:0.88rem;
}

.authentic{
background:rgba(0,255,136,0.08);
border:1px solid rgba(0,255,136,0.22);
color:#00ff88;
}

.fake{
background:rgba(255,0,0,0.08);
border:1px solid rgba(255,0,0,0.22);
color:#ff5c5c;
}

/* INFO CARD */

.card{
background:#101010;
border-radius:18px;
padding:12px;
border:1px solid rgba(0,255,136,0.08);
display:flex;
flex-direction:column;
gap:7px;
}

.strain{
font-size:1rem;
font-weight:900;
text-align:center;
color:#00ff88;
margin-bottom:4px;
}

.row{
display:flex;
justify-content:space-between;
gap:8px;
padding-bottom:6px;
border-bottom:1px solid #1c1c1c;
font-size:0.73rem;
}

.row:last-child{
border-bottom:none;
padding-bottom:0;
}

.label{
color:#888;
font-weight:700;
}

/* WINNER */

.winner{
margin-top:10px;
padding:10px;
border-radius:14px;
background:#241b00;
border:1px solid #d4af37;
text-align:center;
}

.winner h3{
font-size:0.9rem;
color:#ffd95e;
margin-bottom:5px;
}

.winner p{
font-size:0.72rem;
margin-bottom:8px;
line-height:1.35;
color:#eee;
}

.code{
display:inline-block;
padding:8px 14px;
border-radius:10px;
background:#d4af37;
color:black;
font-weight:900;
letter-spacing:1px;
font-size:0.82rem;
}

/* FOOTER */

.footer{
margin-top:12px;
text-align:center;
font-size:0.68rem;
color:#555;
}

</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">

<div class="logo">
<h1>BUD<span>WAY</span></h1>
</div>

<div class="loader" id="loader">

<div class="spinner"></div>

<div class="loading-text">
Authenticating Product...
</div>

</div>

<div class="result" id="result"></div>

<div class="footer">
BudWay Ldn © 2026
</div>

</div>

<script>

const strains = [

{
name:"Pink StarBurst Gelato",
start:803541,
end:803546,
winner:803542,
genetics:"Pink Starburst x Gelato",
thc:"20-26%",
type:"50/50 Hybrid",
flavour:"Candy Strawberry Citrus Creamy"
},

{
name:"Legendary Blueberry",
start:803547,
end:803559,
winner:803551,
genetics:"Afghani x Thai x Purple Thai",
thc:"20-24%",
type:"80/20 Indica",
flavour:"Blueberry Jam Vanilla Earthy Spice"
},

{
name:"Blue Bubblegum Gelato",
start:803560,
end:803568,
winner:803564,
genetics:"Gelato 45 x Indiana Bubblegum",
thc:"24-32%",
type:"60/40 Indica",
flavour:"Sugary Bubblegum Berries Citrus"
},

{
name:"Mango Sapphire",
start:803569,
end:803584,
winner:803578,
genetics:"Bubba’s Gift x OG Kush x Afghan",
thc:"21-23%",
type:"85/15 Indica",
flavour:"Tropical Mango Coconut Citrus"
}

];

window.onload = function(){

const params =
new URLSearchParams(window.location.search);

const serial =
Number(params.get("code"));

const loader =
document.getElementById("loader");

const result =
document.getElementById("result");

/* FORCE SPINNER FIRST */

loader.style.display = "flex";

setTimeout(() => {

let found = null;

for(let strain of strains){

if(serial >= strain.start &&
serial <= strain.end){

found = strain;
break;

}

}

loader.style.display = "none";

if(found){

let winnerHTML = "";

if(serial === found.winner){

winnerHTML = `

<div class="winner">

<h3>
🎉 YOU WON 🎉
</h3>

<p>
You were our lucky winner for this strain!
🎉🎉🎉 — £10 off your Next Order!
</p>

<div class="code">
BW-10
</div>

</div>

`;

}

result.innerHTML = `

<div class="status authentic">
✅ Authentic BudWay Product
</div>

<div class="card">

<div class="strain">
${found.name}
</div>

<div class="row">
<span class="label">Serial</span>
<span>${serial}</span>
</div>

<div class="row">
<span class="label">Genetics</span>
<span>${found.genetics}</span>
</div>

<div class="row">
<span class="label">THC</span>
<span>${found.thc}</span>
</div>

<div class="row">
<span class="label">Type</span>
<span>${found.type}</span>
</div>

<div class="row">
<span class="label">Flavour</span>
<span>${found.flavour}</span>
</div>

${winnerHTML}

</div>

`;

}else{

result.innerHTML = `

<div class="status fake">
❌ Invalid Serial Number
</div>

`;

}

result.style.display = "block";

},1200);

};

</script>

</body>
</html>
