<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BudWay Ldn Verification</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Arial,sans-serif;
background:#050505;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
}

.container{
width:100%;
max-width:420px;
background:#0d0d0d;
border:1px solid #1aff8c30;
border-radius:22px;
padding:24px;
box-shadow:0 0 18px rgba(0,255,140,0.15);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo h1{
font-size:2rem;
font-weight:900;
letter-spacing:2px;
color:#1aff8c;
}

.logo span{
color:#d4af37;
}

.input-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:#111;
color:white;
font-size:1rem;
border:1px solid #1aff8c30;
}

button{
padding:14px 18px;
border:none;
border-radius:12px;
background:#1aff8c;
color:black;
font-weight:700;
cursor:pointer;
transition:0.2s ease;
}

button:hover{
transform:scale(1.03);
}

.loader{
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:25px 0;
}

.spinner{
width:42px;
height:42px;
border:4px solid #222;
border-top:4px solid #1aff8c;
border-radius:50%;
animation:spin 0.8s linear infinite;
margin-bottom:14px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.result{
display:none;
animation:fade 0.4s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.status{
padding:14px;
border-radius:14px;
margin-bottom:18px;
font-weight:700;
text-align:center;
}

.authentic{
background:#0f2a1d;
border:1px solid #1aff8c50;
color:#1aff8c;
}

.fake{
background:#2a1010;
border:1px solid #ff4d4d50;
color:#ff5c5c;
}

.strain-card{
background:#111;
border-radius:18px;
padding:18px;
border:1px solid #1aff8c20;
}

.strain-name{
font-size:1.3rem;
font-weight:800;
margin-bottom:14px;
color:#1aff8c;
}

.info{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #222;
font-size:0.95rem;
}

.info:last-child{
border-bottom:none;
}

.label{
color:#aaa;
}

.winner-box{
margin-top:18px;
padding:16px;
border-radius:16px;
background:#1b1400;
border:1px solid #d4af37;
text-align:center;
}

.winner-box h3{
color:#ffd95e;
margin-bottom:8px;
}

.code{
margin-top:10px;
display:inline-block;
padding:10px 16px;
border-radius:12px;
background:#d4af37;
color:black;
font-weight:900;
letter-spacing:1px;
}

.footer{
margin-top:20px;
text-align:center;
font-size:0.8rem;
color:#666;
}

@media(max-width:480px){

.container{
padding:18px;
border-radius:18px;
}

.logo h1{
font-size:1.7rem;
}

.input-box{
flex-direction:column;
}

button{
width:100%;
}

}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>BUD<span>WAY</span></h1>
</div>

<div class="input-box">
<input type="number" id="serialInput" placeholder="Enter Serial Number">
<button onclick="verifyCode()">VERIFY</button>
</div>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Verifying Product...</p>
</div>

<div class="result" id="result"></div>

<div class="footer">
BudWay Ldn © 2026
</div>

</div>

<script>
const strains = [

{
name:"Pink StarBurst Gelato",
start:803541,
end:803546,
winner:803542,
genetics:"Pink Starburst x Gelato",
thc:"20-26%",
type:"50/50 Hybrid",
flavour:"Candy Strawberry Citrus Creamy"
},

{
name:"Legendary Blueberry",
start:803547,
end:803559,
winner:803551,
genetics:"Afghani x Thai x Purple Thai",
thc:"20-24%",
type:"80/20 Indica",
flavour:"Blueberry Jam Vanilla Earthy Spice"
},

{
name:"Blue Bubblegum Gelato",
start:803560,
end:803568,
winner:803564,
genetics:"Gelato 45 x Indiana Bubblegum",
thc:"24-32%",
type:"60/40 Indica",
flavour:"Sugary Bubblegum Berries Citrus"
},

{
name:"Mango Sapphire",
start:803569,
end:803584,
winner:803578,
genetics:"Bubba’s Gift x OG Kush x Afghan",
thc:"21-23%",
type:"85/15 Indica",
flavour:"Tropical Mango Coconut Citrus"
}

];

function verifyCode(){

const serial = Number(document.getElementById("serialInput").value);

const loader = document.getElementById("loader");
const result = document.getElementById("result");

result.style.display = "none";
loader.style.display = "flex";

setTimeout(()=>{

loader.style.display = "none";

let found = null;

for(let strain of strains){

if(serial >= strain.start && serial <= strain.end){
found = strain;
break;
}

}

if(found){

let winnerHTML = "";

if(serial === found.winner){

winnerHTML = `
<div class="winner-box">
<h3>🎉 WINNER 🎉</h3>
<p>You were our lucky winner for this strain!</p>
<div class="code">BW-10</div>
</div>
`;

}

result.innerHTML = `

<div class="status authentic">
✅ Authentic BudWay Product
</div>

<div class="strain-card">

<div class="strain-name">
${found.name}
</div>

<div class="info">
<span class="label">Serial</span>
<span>${serial}</span>
</div>

<div class="info">
<span class="label">Genetics</span>
<span>${found.genetics}</span>
</div>

<div class="info">
<span class="label">THC</span>
<span>${found.thc}</span>
</div>

<div class="info">
<span class="label">Type</span>
<span>${found.type}</span>
</div>

<div class="info">
<span class="label">Flavour</span>
<span>${found.flavour}</span>
</div>

${winnerHTML}

</div>
`;

}else{

result.innerHTML = `

<div class="status fake">
❌ Invalid Serial Number
</div>

`;

}

result.style.display = "block";

},700);

}

document
.getElementById("serialInput")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
verifyCode();
}

});
</script>

</body>
</html>
