<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BudWay Verification</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#020202;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.bg-glow{
    position:absolute;
    width:700px;
    height:700px;
    background:#00ff88;
    filter:blur(180px);
    opacity:0.12;
    border-radius:50%;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    width:92%;
    max-width:430px;
    padding:35px 25px;
    border-radius:30px;
    background:rgba(10,10,10,0.88);
    border:1px solid rgba(0,255,136,0.15);
    box-shadow:
    0 0 40px rgba(0,255,136,0.08),
    inset 0 0 30px rgba(255,255,255,0.02);
    backdrop-filter:blur(14px);
    text-align:center;
}

.logo{
    font-size:68px;
    font-weight:900;
    letter-spacing:2px;
    margin-bottom:10px;
}

.logo-white{
    color:#f2f2f2;
}

.logo-green{
    color:#00ff88;
    text-shadow:0 0 22px #00ff88;
}

.subtitle{
    color:#9e9e9e;
    letter-spacing:3px;
    font-size:15px;
    margin-bottom:55px;
}

.checkmark{
    font-size:130px;
    margin-bottom:25px;
    animation:pulse 2s infinite;
    filter:drop-shadow(0 0 25px #00ff88);
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.06);}
    100%{transform:scale(1);}
}

.status{
    font-size:58px;
    font-weight:900;
    letter-spacing:4px;
    margin-bottom:12px;
}

.valid{
    color:#ffffff;
}

.message{
    color:#bdbdbd;
    font-size:20px;
    margin-bottom:45px;
}

.strain-name{
    font-size:46px;
    font-weight:800;
    color:#00ff88;
    text-shadow:0 0 18px #00ff88;
    margin-bottom:25px;
}

.strain-card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,255,136,0.18);
    border-radius:22px;
    padding:18px;
    margin-bottom:30px;
    backdrop-filter:blur(12px);
}

.info-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,0.07);
}

.info-row:last-child{
    border-bottom:none;
}

.label{
    color:#00ff88;
    font-size:13px;
    letter-spacing:1px;
    font-weight:700;
}

.value{
    color:#d9d9d9;
    font-size:13px;
    text-align:right;
    max-width:60%;
}

.serial{
    color:#8a8a8a;
    font-size:17px;
    letter-spacing:4px;
    margin-bottom:18px;
}

.footer{
    color:#5e5e5e;
    font-size:13px;
    letter-spacing:1px;
}

.invalid-box{
    display:none;
}

.invalid .checkmark{
    filter:drop-shadow(0 0 25px red);
}

.invalid .status{
    color:red;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

    <div class="logo">
        <span class="logo-white">BUD</span><span class="logo-green">WAY</span>
    </div>

    <div class="subtitle">
        PREMIUM PRODUCT VERIFICATION
    </div>

    <div id="verifiedSection">

        <div class="checkmark">✅</div>

        <div class="status valid">
            VERIFIED
        </div>

        <div class="message">
            Authentic BudWay Product
        </div>

        <div class="strain-name" id="strainName"></div>

        <div class="strain-card">

            <div class="info-row">
                <div class="label">TYPE</div>
                <div class="value" id="strainType"></div>
            </div>

            <div class="info-row">
                <div class="label">THC</div>
                <div class="value" id="strainTHC"></div>
            </div>

            <div class="info-row">
                <div class="label">TERPENES</div>
                <div class="value" id="strainTerpenes"></div>
            </div>

            <div class="info-row">
                <div class="label">EFFECTS</div>
                <div class="value" id="strainEffects"></div>
            </div>

        </div>

        <div class="serial" id="serialNumber"></div>

        <div class="footer">
            OFFICIAL BUDWAY VERIFIED PRODUCT
        </div>

    </div>

    <div id="invalidSection" class="invalid-box">

        <div class="checkmark">❌</div>

        <div class="status">
            INVALID
        </div>

        <div class="message">
            Product Not Recognised
        </div>

    </div>

</div>

<script>

const strains = [

{
    name:"Pink Starburst 🌸",
    start:803541,
    end:803542,
    type:"Hybrid",
    thc:"32%",
    terpenes:"Sweet Candy • Cream",
    effects:"Relaxed • Euphoric"
},

{
    name:"Blueberry 🫐",
    start:803547,
    end:803559,
    type:"Indica",
    thc:"30%",
    terpenes:"Berry • Earthy • Sweet",
    effects:"Calm • Sleepy"
},

{
    name:"Blue Bubblegum Gelato 🫧",
    start:803560,
    end:803568,
    type:"Hybrid",
    thc:"33%",
    terpenes:"Bubblegum • Cream • Diesel",
    effects:"Happy • Relaxed"
},

{
    name:"Mango Sapphire 🥭",
    start:803569,
    end:803584,
    type:"Sativa Hybrid",
    thc:"34%",
    terpenes:"Mango • Citrus • Tropical Gas",
    effects:"Energetic • Euphoric"
}

];

const params = new URLSearchParams(window.location.search);

const code = parseInt(params.get("code"));

const verifiedSection = document.getElementById("verifiedSection");
const invalidSection = document.getElementById("invalidSection");

let matchedStrain = null;

for(let strain of strains){

    if(code >= strain.start && code <= strain.end){
        matchedStrain = strain;
        break;
    }
}

if(matchedStrain){

    document.getElementById("strainName").innerText =
    matchedStrain.name;

    document.getElementById("strainType").innerText =
    matchedStrain.type;

    document.getElementById("strainTHC").innerText =
    matchedStrain.thc;

    document.getElementById("strainTerpenes").innerText =
    matchedStrain.terpenes;

    document.getElementById("strainEffects").innerText =
    matchedStrain.effects;

    document.getElementById("serialNumber").innerText =
    "SERIAL " + code;

}else{

    verifiedSection.style.display = "none";
    invalidSection.style.display = "block";
}

</script>

</body>
</html>
