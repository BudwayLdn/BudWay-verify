<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudWay Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#070707;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:16px;
color:white;
overflow:hidden;
}

/* SIMPLE BACKGROUND */

body::before{
content:"";
position:fixed;
width:220px;
height:220px;
background:#00ff8840;
border-radius:50%;
filter:blur(80px);
top:-60px;
left:-60px;
z-index:0;
}

body::after{
content:"";
position:fixed;
width:200px;
height:200px;
background:#d4af3740;
border-radius:50%;
filter:blur(80px);
bottom:-60px;
right:-60px;
z-index:0;
}

/* MAIN CARD */

.container{
position:relative;
z-index:1;
width:100%;
max-width:360px;
background:#111;
border:1px solid #1f1f1f;
border-radius:22px;
padding:18px;
box-shadow:0 0 25px rgba(0,0,0,0.45);
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:18px;
}

.logo h1{
font-size:1.9rem;
font-weight:900;
letter-spacing:2px;
color:#00ff88;
}

.logo span{
color:#d4af37;
}

/* LOADER */

.loader{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:55px 0;
}

.spinner{
width:54px;
height:54px;
border-radius:50%;
border:4px solid #222;
border-top:4px solid #00ff88;
animation:spin 0.7s linear infinite;
margin-bottom:16px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loading-text{
font-size:0.9rem;
color:#999;
}

/* RESULT */

.result{
display:none;
animation:fade 0.25s ease;
}

@keyframes fade{
from{
opacity:0;
}
to{
opacity:1;
}
}

.status{
padding:12px;
border-radius:14px;
font-size:0.88rem;
font-weight:800;
text-align:center;
margin-bottom:14px;
}

.authentic{
background:#0d2419;
border:1px solid #1d5b40;
color:#00ff88;
}

.fake{
background:#2a1111;
border:1px solid #5e1f1f;
color:#ff5c5c;
}

/* INFO CARD */

.card{
background:#181818;
border-radius:18px;
padding:14px;
display:flex;
flex-direction:column;
gap:8px;
border:1px solid #222;
}

.strain{
font-size:1rem;
font-weight:900;
text-align:center;
color:#00ff88;
margin-bottom:2px;
}

.row{
display:flex;
justify-content:space-between;
gap:10px;
padding-bottom:7px;
border-bottom:1px solid #242424;
font-size:0.74rem;
}

.row:last-child{
border-bottom:none;
padding-bottom:0;
}

.label{
color:#8a8a8a;
font-weight:700;
}

/* WINNER */

.winner{
margin-top:10px;
background:#2a2209;
border:1px solid #6e5720;
border-radius:14px;
padding:12px;
text-align:center;
}

.winner h3{
font-size:0.9rem;
color:#ffd95e;
margin-bottom:5px;
}

.winner p{
font-size:0.72rem;
color:#eee;
line-height:1.35;
margin-bottom:8px;
}

.code{
display:inline-block;
padding:8px 14px;
border-radius:10px;
background:#d4af37;
color:black;
font-size:0.84rem;
font-weight:900;
letter-spacing:1px;
}

/* FOOTER */

.footer{
margin-top:14px;
text-align:center;
font-size:0.66rem;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>BUD<span>WAY</span></h1>
</div>

<!-- LOADER -->

<div class="loader" id="loader">

<div class="spinner"></div>

<div class="loading-text">
Authenticating Product...
</div>

</div>

<!-- RESULT -->

<div class="result" id="result"></div>

<div class="footer">
BudWay Ldn © 2026
</div>

</div>

<script>

const strains = [

{
name:"Pink StarBurst Gelato",
start:803541,
end:803546,
winner:803542,
genetics:"Pink Starburst x Gelato",
thc:"20-26%",
type:"50/50 Hybrid",
flavour:"Candy Strawberry Citrus Creamy"
},

{
name:"Legendary Blueberry",
start:803547,
end:803559,
winner:803551,
genetics:"Afghani x Thai x Purple Thai",
thc:"20-24%",
type:"80/20 Indica",
flavour:"Blueberry Jam Vanilla Earthy Spice"
},

{
name:"Blue Bubblegum Gelato",
start:803560,
end:803568,
winner:803564,
genetics:"Gelato 45 x Indiana Bubblegum",
thc:"24-32%",
type:"60/40 Indica",
flavour:"Sugary Bubblegum Berries Citrus"
},

{
name:"Mango Sapphire",
start:803569,
end:803584,
winner:803578,
genetics:"Bubba’s Gift x OG Kush x Afghan",
thc:"21-23%",
type:"85/15 Indica",
flavour:"Tropical Mango Coconut Citrus"
}

];

window.onload = function(){

const params =
new URLSearchParams(window.location.search);

const serial =
Number(params.get("code"));

const loader =
document.getElementById("loader");

const result =
document.getElementById("result");

/* FORCE IMMEDIATE LOADER */

loader.style.display = "flex";
result.style.display = "none";

/* GIVE BROWSER TIME TO RENDER SPINNER */

setTimeout(() => {

let found = null;

for(let strain of strains){

if(
serial >= strain.start &&
serial <= strain.end
){

found = strain;
break;

}

}

/* HIDE LOADER */

loader.style.display = "none";

/* SHOW RESULT */

if(found){

let winnerHTML = "";

if(serial === found.winner){

winnerHTML = `

<div class="winner">

<h3>
🎉 YOU WON 🎉
</h3>

<p>
You were our lucky winner for this strain!
£10 off your next order.
</p>

<div class="code">
BW-10
</div>

</div>

`;

}

result.innerHTML = `

<div class="status authentic">
✅ Authentic BudWay Product
</div>

<div class="card">

<div class="strain">
${found.name}
</div>

<div class="row">
<span class="label">Serial</span>
<span>${serial}</span>
</div>

<div class="row">
<span class="label">Genetics</span>
<span>${found.genetics}</span>
</div>

<div class="row">
<span class="label">THC</span>
<span>${found.thc}</span>
</div>

<div class="row">
<span class="label">Type</span>
<span>${found.type}</span>
</div>

<div class="row">
<span class="label">Flavour</span>
<span>${found.flavour}</span>
</div>

${winnerHTML}

</div>

`;

}else{

result.innerHTML = `

<div class="status fake">
❌ Invalid Serial Number
</div>

`;

}

result.style.display = "block";

},1500);

};

</script>

</body>
</html>
